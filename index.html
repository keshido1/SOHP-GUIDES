<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V5 PEACH ANIME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-img: url('https://images.alphacoders.com/110/thumb-1920-1103783.png');
            --peach: #ff8e6e;
            --glass: rgba(255, 255, 255, 0.88);
        }

        body, html { margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; overflow-x: hidden; }

        /* Background and Blur Logic */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-img) center/cover no-repeat;
            z-index: -1; transition: 0.6s ease;
            filter: blur(10px) brightness(0.8);
        }
        body.wallpaper-mode .bg-layer { filter: blur(0px) brightness(1); }
        body.wallpaper-mode .container { opacity: 0; pointer-events: none; }

        .container { 
            display: flex; max-width: 1200px; margin: 0 auto; padding: 30px; 
            gap: 25px; flex-wrap: wrap; transition: 0.4s; 
        }

        /* Card Styling */
        .card { 
            background: var(--glass); border-radius: 20px; padding: 25px; 
            margin-bottom: 25px; border: 2px solid #ffdbc5; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1, h2 { color: var(--peach); margin-top: 0; }

        /* Inputs & Buttons */
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ffdbc5; 
            border-radius: 12px; box-sizing: border-box; font-family: inherit;
        }
        button { 
            background: var(--peach); color: white; border: none; padding: 12px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; 
        }

        /* Trash Button Fixed */
        .delete-btn {
            position: absolute; top: 15px; right: 15px;
            background: white; border: 1px solid #ffdbc5; border-radius: 50%;
            width: 32px; height: 32px; cursor: pointer; color: var(--peach);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; z-index: 10;
        }
        .delete-btn:hover { background: var(--peach); color: white; transform: scale(1.1); }

        /* Toggle UI Button */
        .toggle-ui {
            position: fixed; bottom: 25px; right: 25px; z-index: 100;
            background: var(--peach); color: white; border: 2px solid white;
            padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        .main-col { flex: 2; min-width: 350px; }
        .side-col { flex: 1; min-width: 300px; }
        img { max-width: 100%; border-radius: 15px; margin-top: 15px; border: 3px solid white; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <button class="toggle-ui" onclick="document.body.classList.toggle('wallpaper-mode')">🖼️ View Wallpaper</button>

    <div class="container">
        <div class="main-col">
            <h1>🌸 SOHP Guides</h1>
            <div class="card">
                <h2>New Guide</h2>
                <input id="title" placeholder="Guide title">
                <textarea id="content" placeholder="Content..." rows="3"></textarea>
                <input type="file" id="fileInput">
                <button id="postBtn">Post Guide ✨</button>
            </div>
            <div id="guides-list">Loading...</div>
        </div>

        <div class="side-col">
            <h2>✨ Updates</h2>
            <div class="card">
                <textarea id="upContent" placeholder="Announcement..." rows="2"></textarea>
                <button id="upBtn" style="background: #5d4a44;">Post Update</button>
            </div>
            <div id="updates-list">Loading...</div>
        </div>
    </div>

<script>
    const client = supabase.createClient(
        "https://ioruwtajlnnxxqmgxugn.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
    );

    async function load() {
        const { data: g } = await client.from("Euides").select("*").order("created_at", { ascending: false });
        const gDiv = document.getElementById("guides-list");
        gDiv.innerHTML = "";
        g.forEach(item => {
            let media = item.image_url ? `<img src="${item.image_url}"><br><a href="${item.image_url}" target="_blank" style="color:#ff8e6e;font-weight:bold;text-decoration:none;display:block;margin-top:10px;">💾 Download File</a>` : "";
            gDiv.innerHTML += `<div class="card"><div class="delete-btn" onclick="del('Euides', ${item.id})">🗑️</div><h3>${item.title}</h3><p>${item.content}</p>${media}</div>`;
        });

        const { data: u } = await client.from("community_updates").select("*").order("created_at", { ascending: false });
        const uDiv = document.getElementById("updates-list");
        uDiv.innerHTML = "";
        u.forEach(up => {
            uDiv.innerHTML += `<div class="card" style="padding:15px;border-left:5px solid #ff8e6e;"><div class="delete-btn" onclick="del('community_updates', ${up.id})" style="width:24px;height:24px;font-size:12px;">🗑️</div><p>${up.content}</p></div>`;
        });
    }

    document.getElementById("postBtn").onclick = async () => {
        const t = document.getElementById("title").value;
        const c = document.getElementById("content").value;
        const f = document.getElementById("fileInput").files[0];
        let url = null;
        if (f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{ title: t, content: c, image_url: url }]);
        location.reload();
    };

    document.getElementById("upBtn").onclick = async () => {
        if(prompt("Password?") === 'skibidi') {
            await client.from("community_updates").insert([{ content: document.getElementById("upContent").value }]);
            location.reload();
        }
    };

    window.del = async (table, id) => {
        if(prompt("Password?") === 'skibidi') {
            await client.from(table).delete().eq("id", id);
            location.reload();
        }
    };

    window.onload = load;
</script>
</body>
</html>
