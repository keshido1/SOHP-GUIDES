<!DOCTYPE html>
<html>
<head>
  <title>SOHP Guides</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f9f9f9; }
    .post, .comment { border: 1px solid #ddd; padding: 15px; margin: 20px 0; background: white; border-radius: 8px; }
    img, video { max-width: 100%; margin-top: 10px; display: block; border-radius: 4px; }
    input, textarea { width: 100%; margin-top: 5px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 8px 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>

<h1>SOHP Guides</h1>

<div style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
  <h2>Create Guide</h2>
  <input id="title" placeholder="Guide title">
  <textarea id="content" placeholder="Guide content" rows="4"></textarea>
  <input type="file" id="image" accept="image/*">
  <div id="preview"></div>
  <button id="postGuideBtn">Post Guide</button>
</div>

<h2>All Guides</h2>
<div id="guides"></div>

<script 
  src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.6/dist/supabase.min.js"
  onload="initApp()"
></script>

<script>
  let supabaseClient;

  async function initApp() {
    // Now supabase is guaranteed to be defined
    supabaseClient = supabase.createClient(
      "https://ioruwtajlnnxxqmgxugn.supabase.co", 
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
    );

    document.getElementById("postGuideBtn").addEventListener("click", createGuide);
    loadGuides();
  }

  // Define your createGuide, loadGuides, and postComment functions here
  async function createGuide() {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    if (!title || !content) return alert("Fill in title and content");

    try {
      const { error } = await supabaseClient.from("Euides").insert([{ title, content }]);
      if (error) throw error;
      location.reload();
    } catch (err) {
      alert("Error: " + err.message);
    }
  }

  async function loadGuides() {
    try {
      const { data: guides, error } = await supabaseClient.from("Euides").select("*").order("created_at", { ascending: false });
      if (error) throw error;

      const container = document.getElementById("guides");
      guides.forEach(g => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `<h3>${g.title}</h3><p>${g.content}</p>`;
        container.appendChild(div);
      });
    } catch (err) {
      console.error("Fetch error:", err.message);
    }
  }
</script>
</body>
</html>
