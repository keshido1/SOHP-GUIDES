<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOHP Guides</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0/dist/umd/supabase.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f8f9fa; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .post { background: white; border: 1px solid #e1e4e8; padding: 20px; margin: 20px 0; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d5da; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background: #0056b3; }
        img { max-width: 100%; border-radius: 8px; margin-top: 15px; display: block; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h1>SOHP Guides</h1>

    <div class="card">
        <h2>Create Guide</h2>
        <input id="title" placeholder="Guide title">
        <textarea id="content" rows="4" placeholder="Share your guide details..."></textarea>
        <button id="postBtn">Post to Public</button>
    </div>

    <h2>Recent Guides</h2>
    <div id="guides" class="loading">Connecting to database...</div>

    <script>
        // Use a small delay to ensure the library from the CDN is ready
        window.addEventListener('load', function() {
            if (typeof supabase === 'undefined') {
                document.getElementById('guides').innerHTML = "<b style='color:red'>Library Blocked. Please disable your browser's ad-blocker or 'Shields'.</b>";
                return;
            }

            const supabaseClient = supabase.createClient(
                "https://ioruwtajlnnxxqmgxugn.supabase.co", 
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
            );

            async function loadGuides() {
                try {
                    const { data, error } = await supabaseClient
                        .from("Euides")
                        .select("*")
                        .order("created_at", { ascending: false });

                    if (error) throw error;

                    const container = document.getElementById("guides");
                    container.classList.remove("loading");
                    
                    if (!data || data.length === 0) {
                        container.innerHTML = "No guides found. Be the first to post!";
                        return;
                    }

                    container.innerHTML = "";
                    data.forEach(g => {
                        const div = document.createElement("div");
                        div.className = "post";
                        div.innerHTML = `
                            <h3>${g.title || 'Untitled'}</h3>
                            <p>${g.content || ''}</p>
                            ${g.image_url ? `<img src="${g.image_url}">` : ""}
                        `;
                        container.appendChild(div);
                    });
                } catch (e) {
                    document.getElementById("guides").innerHTML = "Error: " + e.message;
                }
            }

            async function createGuide() {
                const title = document.getElementById("title").value.trim();
                const content = document.getElementById("content").value.trim();

                if (!title || !content) {
                    alert("Please fill in both the title and content.");
                    return;
                }

                try {
                    const { error } = await supabaseClient
                        .from("Euides")
                        .insert([{ title, content }]);

                    if (error) throw error;

                    alert("Successfully posted!");
                    location.reload();
                } catch (e) {
                    alert("Post failed: " + e.message);
                }
            }

            document.getElementById("postBtn").onclick = createGuide;
            loadGuides();
        });
    </script>
</body>
</html>
