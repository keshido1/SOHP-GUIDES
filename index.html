<script>
        setTimeout(() => {
            const supabaseClient = supabase.createClient(
                "https://ioruwtajlnnxxqmgxugn.supabase.co", 
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
            );

            async function loadGuides() {
                const { data, error } = await supabaseClient.from("Euides").select("*").order("created_at", { ascending: false });
                const container = document.getElementById("guides");
                if (error) { container.innerHTML = "Error: " + error.message; return; }
                container.innerHTML = data.length ? "" : "No guides found.";
                data.forEach(g => {
                    // This line now checks for an image_url and displays it
                    container.innerHTML += `
                        <div class="post">
                            <h3>${g.title}</h3>
                            <p>${g.content}</p>
                            ${g.image_url ? `<img src="${g.image_url}" style="max-width:100%; border-radius:8px;">` : ""}
                        </div>`;
                });
            }

            document.getElementById("postBtn").onclick = async () => {
                const title = document.getElementById("title").value;
                const content = document.getElementById("content").value;
                const fileInput = document.getElementById("image");
                const file = fileInput.files[0];
                let imageUrl = null;

                // 1. Upload the file if one is selected
                if (file) {
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from("guide-media")
                        .upload(fileName, file);
                    
                    if (uploadError) {
                        alert("Upload failed: " + uploadError.message);
                        return;
                    }
                    
                    // 2. Get the public URL for the database
                    const { publicURL } = supabaseClient.storage.from("guide-media").getPublicUrl(fileName);
                    imageUrl = publicURL;
                }

                // 3. Insert into the database
                const { error } = await supabaseClient.from("Euides").insert([{ title, content, image_url: imageUrl }]);
                if (error) alert(error.message);
                else location.reload();
            };

            loadGuides();
        }, 1000);
    </script>
