<script>
    // ... (Keep the same client initialization)

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        
        if(!email || !pass) return alert("Enter email and password!");

        if(type === 'signup') {
            const { data, error } = await client.auth.signUp({
                email, 
                password: pass,
                options: { emailRedirectTo: window.location.href } // Forces it to return here, not localhost
            });
            if(error) alert("Sign up error: " + error.message);
            else alert("Check your email inbox for a confirmation link!");
        } else {
            const { data, error } = await client.auth.signInWithPassword({ email, password: pass });
            if(error) alert("Login error: " + error.message);
            else window.location.reload();
        }
    }

    // UPDATED DELETE FUNCTION
    async function deleteItem(table, id) {
        if (!isStaff) {
            if (prompt("Enter Staff Password to Delete:") !== 'skibidi') return;
        }
        
        if (confirm("Are you sure you want to delete this forever?")) {
            const { error } = await client.from(table).delete().eq('id', id);
            
            if (error) {
                console.error(error);
                alert("Database blocked deletion. Check your Supabase RLS Policies! Error: " + error.message);
            } else {
                alert("Deleted successfully.");
                window.location.reload();
            }
        }
    }

    // UPDATED DOWNLOAD/FILE LOGIC
    // To ensure files download rather than just opening, we use the 'download' attribute in the UI
    function openDetails(g) {
        activeGuideId = g.id;
        let mediaHtml = "";
        
        if(g.image_url) {
            const isVid = g.image_url.match(/\.(mp4|mov|webm)$/i);
            mediaHtml = `
                <div style="margin-top:20px;">
                    ${isVid ? `<video controls src="${g.image_url}" style="width:100%; border-radius:15px;"></video>` : `<img src="${g.image_url}" style="width:100%; border-radius:15px;">`}
                    <br>
                    <a href="${g.image_url}" download target="_blank" style="display:inline-block; margin-top:10px; color:var(--peach); font-weight:800; text-decoration:none;">
                        📥 Download Attached File
                    </a>
                </div>`;
        }

        document.getElementById('modal-body').innerHTML = `
            ${isStaff ? `<button onclick="deleteItem('Euides', ${g.id})" style="background:#ef4444; float:right; padding:5px 10px; font-size:12px;">Delete Guide</button>` : ''}
            <h1 style="margin:0;">${g.title}</h1>
            <span style="color:var(--peach); font-weight:800;">${g.category}</span>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <p style="white-space:pre-wrap; line-height:1.6;">${g.content}</p>
            ${mediaHtml}
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
        loadComments(g.id);
    }
</script>
