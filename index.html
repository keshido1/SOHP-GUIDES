<!DOCTYPE html>
<html>
<head>
  <title>SOHP Guides</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; }
    .post { border: 1px solid #ccc; padding: 10px; margin: 15px 0; }
    img { max-width: 100%; }
  </style>
</head>
<body>

<h1>SOHP Guides</h1>

<h2>Create Guide</h2>
<input id="title" placeholder="Guide title"><br><br>
<textarea id="content" placeholder="Guide content"></textarea><br><br>
<input type="file" id="image"><br><br>
<button onclick="createGuide()">Post Guide</button>

<h2>All Guides</h2>
<div id="guides"></div>

<script>
const supabase = supabase.createClient(
  "https://supabase.com/dashboard/project/ioruwtajlnnxxqmgxugn",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
);

async function createGuide() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  const { data, error } = await supabase
    .from("guides")
    .insert([{ title, content }]);

  if (error) alert(error.message);
  loadGuides();
}

async function loadGuides() {
  const { data } = await supabase.from("guides").select("*").order("created_at", { ascending: false });

  document.getElementById("guides").innerHTML = "";

  data.forEach(g => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `<h3>${g.title}</h3><p>${g.content}</p>`;
    document.getElementById("guides").appendChild(div);
  });
}

loadGuides();
</script>

</body>
</html>
