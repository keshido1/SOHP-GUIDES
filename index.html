<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - Stable V42</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --outline: #cbd5e1; }
        #site-bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -9999; background: #1a1a1a no-repeat center center; background-size: cover; }
        #bg-blur-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(20px) brightness(0.6); background: rgba(0,0,0,0.3); transition: 0.5s; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; background: transparent !important; }

        /* Wallpaper Mode Fix: Keep floating tools visible */
        body.wallpaper-mode .main-ui { opacity: 0; pointer-events: none; }
        body.wallpaper-mode #bg-blur-overlay { backdrop-filter: blur(0px) brightness(1); background: transparent; }
        body.wallpaper-mode .circle-btn:not(.eye-btn) { opacity: 0; pointer-events: none; }

        .main-ui { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; transition: 0.5s ease; }
        .user-auth-bar { background: var(--glass); padding: 15px 25px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .content-layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

        .preview-card { background: var(--glass); border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .preview-thumb { width: 100%; height: 140px; object-fit: cover; background: #000; }
        
        #modalOverlay, #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .panel-content { background: white; width: 95%; max-width: 850px; max-height: 90vh; border-radius: 30px; overflow-y: auto; padding: 40px; position: relative; }

        .floating-tools { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .eye-btn { background: white; color: var(--peach); }

        button { background: var(--peach); color: white; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        input, textarea, select { padding: 12px; border-radius: 12px; border: 2px solid var(--outline); width: 100%; box-sizing: border-box; }
        .file-tag { background: #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 8px; display: inline-block; }
        .hidden { display: none !important; }

        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="site-bg-layer"><div id="bg-blur-overlay"></div></div>

    <div class="floating-tools">
        <button class="circle-btn" style="background:#1e293b; color:white;" onclick="openAdmin()">⚙️</button>
        <button class="circle-btn eye-btn" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</button>
    </div>

    <div id="modalOverlay" onclick="closeModals(event)">
        <div class="panel-content">
            <div id="modal-body"></div>
            <div style="margin-top:30px; border-top:2px solid #eee; padding-top:20px;">
                <h3>Comments</h3>
                <div id="comment-list"></div>
                <div id="comment-form" class="hidden">
                    <textarea id="cInput" placeholder="Write a comment..." rows="2" style="margin-top:10px;"></textarea>
                    <button onclick="postComment()" style="margin-top:8px;">Post Comment</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminOverlay" onclick="closeModals(event)">
        <div class="panel-content">
            <h2 style="color:var(--peach);">Staff Dashboard</h2>
            <h3>Review Queue</h3>
            <div id="pendingList">Loading...</div>
            <hr style="margin:20px 0;">
            <h3>Announcements & Background</h3>
            <textarea id="bcContent" placeholder="Post a new announcement..."></textarea>
            <button onclick="postUpdate()" style="width:100%; margin:10px 0; background:#0f172a;">Post Update</button>
            <input id="bgUrlInput" placeholder="Wallpaper Image URL">
            <button onclick="updateWallpaper()" style="width:100%; margin-top:10px; background:#475569;">Apply Wallpaper</button>
        </div>
    </div>

    <div class="main-ui">
        <h1 style="color:white; text-align:center; font-size:3rem; text-shadow:0 4px 20px rgba(0,0,0,0.6); margin-bottom:30px;">🌸 SOHP GUIDES</h1>

        <div class="user-auth-bar">
            <div id="user-info" style="font-weight:800;">Guest Mode</div>
            <div id="auth-controls">
                <input id="auth-email" type="email" placeholder="Email" style="width:140px;">
                <input id="auth-pass" type="password" placeholder="Pass" style="width:100px;">
                <button onclick="handleAuth('signup')">Join</button>
                <button onclick="handleAuth('login')" style="background:#0f172a;">Login</button>
            </div>
            <div id="logged-in-controls" class="hidden">
                <button onclick="client.auth.signOut().then(()=>location.reload())" style="background:#ef4444;">Logout</button>
            </div>
        </div>

        <div class="content-layout">
            <div>
                <div style="background:var(--glass); padding:25px; border-radius:25px; border-top:6px solid var(--peach);">
                    <h3>Submit Guide</h3>
                    <input id="gTitle" placeholder="Title">
                    <div style="display:flex; gap:10px; margin:10px 0;">
                        <select id="gCat"></select>
                        <input type="file" id="gFile">
                    </div>
                    <textarea id="gContent" placeholder="Guide details..." rows="3"></textarea>
                    <button onclick="submitGuide()" style="width:100%; margin-top:15px;">Submit ✨</button>
                </div>

                <div style="display:flex; gap:10px; margin:25px 0;">
                    <input type="text" id="search" placeholder="Search..." onkeyup="loadGuides()">
                    <select id="fCat" onchange="loadGuides()" style="width:140px;"></select>
                </div>

                <div id="guide-grid" class="guide-grid"></div>
            </div>

            <div>
                <h2 style="color:white;">📢 Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    
    let isStaff = false;
    let currentUser = null;
    let activeGuideId = null;

    function getFileType(url) {
        if(!url) return "TEXT";
        const ext = url.split('.').pop().toLowerCase();
        return ext.toUpperCase();
    }

    client.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user || null;
        if(currentUser) {
            document.getElementById('user-info').innerText = currentUser.email;
            document.getElementById('auth-controls').classList.add('hidden');
            document.getElementById('logged-in-controls').classList.remove('hidden');
            document.getElementById('comment-form').classList.remove('hidden');
        }
    });

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const { error } = type === 'signup' ? 
            await client.auth.signUp({email, password: pass, options: { emailRedirectTo: window.location.href }}) : 
            await client.auth.signInWithPassword({email, password: pass});
        if(error) alert(error.message); else if(type==='signup') alert("Check email to confirm!"); else location.reload();
    }

    async function load() {
        try {
            const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
            if(bg?.value) document.getElementById('site-bg-layer').style.backgroundImage = `url('${bg.value}')`;

            const { data: cats } = await client.from("guide_categories").select("*");
            const f = document.getElementById('fCat'), g = document.getElementById('gCat');
            f.innerHTML = '<option value="All">All Tags</option>'; g.innerHTML = '';
            cats?.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; g.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
            
            loadGuides();
            loadUpdates();
        } catch(e) { console.warn("Supabase load error: " + e.message); }
    }

    async function loadGuides() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        let query = client.from("Euides").select("*").eq("approved", true).order("created_at", {ascending: false});
        if(cat !== "All") query = query.eq("category", cat);
        
        const { data: gs } = await query;
        const grid = document.getElementById('guide-grid');
        grid.innerHTML = "";
        gs?.filter(g => g.title.toLowerCase().includes(q)).forEach(g => {
            grid.innerHTML += `
                <div class="preview-card" onclick='openDetails(${JSON.stringify(g).replace(/'/g, "&apos;")})'>
                    <img class="preview-thumb" src="${g.image_url || 'https://via.placeholder.com/300x140?text=No+Media'}">
                    <div style="padding:15px;">
                        <span class="file-tag">${getFileType(g.image_url)}</span>
                        <h4 style="margin:5px 0;">${g.title}</h4>
                    </div>
                </div>`;
        });
    }

    function openDetails(g) {
        activeGuideId = g.id;
        const fType = getFileType(g.image_url);
        document.getElementById('modal-body').innerHTML = `
            ${isStaff ? `<button onclick="deleteItem('Euides', ${g.id})" style="background:red; float:right;">Delete</button>` : ''}
            <h1>${g.title}</h1>
            <p style="white-space:pre-wrap;">${g.content}</p>
            ${g.image_url ? `
                <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                    <b>Attached: ${fType}</b><br>
                    ${fType.match(/(MP4|WEBM|MOV)/) ? `<video controls src="${g.image_url}" style="width:100%; border-radius:15px;"></video>` : `<img src="${g.image_url}" style="width:100%; border-radius:15px;">`}
                    <br><a href="${g.image_url}" download target="_blank" style="display:inline-block; margin-top:10px; color:var(--peach); font-weight:800; text-decoration:none;">📥 Download File</a>
                </div>` : ''}
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
        loadComments(g.id);
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        if(!t) return alert("Title required.");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false}]);
        alert("Sent for review!"); location.reload();
    }

    function openAdmin() {
        if(!isStaff) { if(prompt("Pass?") === 'skibidi') isStaff = true; else return; }
        document.getElementById('adminOverlay').style.display = 'flex';
        loadAdmin();
    }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const div = document.getElementById('pendingList');
        div.innerHTML = p?.length ? "" : "None pending.";
        p?.forEach(i => {
            div.innerHTML += `<div style="padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px;">
                <span class="file-tag">${getFileType(i.image_url)}</span>
                <h4>${i.title}</h4>
                <p style="font-size:12px;">${i.content.substring(0,50)}...</p>
                ${i.image_url ? `<a href="${i.image_url}" target="_blank" style="font-size:11px; color:blue;">[Check File]</a><br><br>` : ''}
                <button onclick="approve(${i.id})" style="background:green;">Approve</button>
                <button onclick="deleteItem('Euides', ${i.id})" style="background:red;">Reject</button>
            </div>`;
        });
    }

    async function approve(id) { await client.from("Euides").update({approved:true}).eq("id", id); loadAdmin(); loadGuides(); }
    async function deleteItem(table, id) { if(confirm("Delete forever?")) { await client.from(table).delete().eq("id", id); location.reload(); } }
    function closeModals(e) { if(e.target.id.includes('Overlay')) e.target.style.display = 'none'; }
    async function postUpdate() { await client.from("community_updates").insert([{content: document.getElementById('bcContent').value}]); location.reload(); }
    async function updateWallpaper() { await client.from("site_settings").upsert({id: "wallpaper", value: document.getElementById('bgUrlInput').value}); location.reload(); }
    async function loadUpdates() {
        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const div = document.getElementById('updates-list'); div.innerHTML = "";
        us?.forEach(u => { div.innerHTML += `<div style="background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid var(--peach);">${u.content}</div>`; });
    }

    window.onload = load;
</script>
</body>
</html>
