<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V25</title>
    <link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/gensin-impact/images/9/9e/Icon_Emoji_Paimon%27s_Paintings_41_Alice_1.png/revision/latest/scale-to-width-down/250?cb=20250528172355">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --outline: #d1d5db; }

        /* Fix: Force a light fallback so it's NEVER black */
        html, body { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: #fdf2f0 !important; 
        }

        .bg-viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .bg-layer { 
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; 
            background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.8); 
        }
        .edge-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            box-shadow: inset 0 0 120px 40px rgba(255, 255, 255, 0.5);
        }

        .main-ui { padding: 40px 20px; position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }

        h1 { font-size: 2.8rem; color: white; text-align: center; text-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 40px; font-weight: 800; }

        .card { 
            background: var(--glass); border-radius: 24px; padding: 25px; 
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255,255,255,0.8);
            box-sizing: border-box;
        }

        /* Fixed Outlined Text Boxes */
        input, textarea, select { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 2px solid var(--outline); 
            border-radius: 14px; box-sizing: border-box; 
            font-family: inherit; transition: 0.2s;
            background: #ffffff;
        }
        input:focus, textarea:focus { border-color: var(--peach); outline: none; box-shadow: 0 0 0 4px rgba(255,142,110,0.1); }

        button { background: var(--peach); color: white; border: none; padding: 15px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* Media Handling */
        .media-container { margin-top: 15px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; background: #000; }
        .media-container img, .media-container video { width: 100%; display: block; max-height: 500px; object-fit: contain; }
        .download-btn { display: inline-block; margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--peach); text-decoration: none; border: 1px solid var(--peach); padding: 5px 12px; border-radius: 8px; }

        /* Admin Dashboard */
        #adminPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 750px; max-height: 85vh; overflow-y: auto; background: white; z-index: 1001; border-radius: 30px; padding: 30px; display: none; border: 4px solid var(--peach); box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; }
        .version-tag { position: absolute; bottom: 15px; right: 25px; font-size: 10px; color: #bbb; letter-spacing: 1px; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="bg-viewport"><div class="bg-layer" id="bg"></div></div>
    <div class="edge-glow"></div>
    
    <div style="position:fixed; bottom:85px; right:25px; background:#222; color:white; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; border:2px solid #fff;" onclick="openAdmin()">⚙️</div>
    <div style="position:fixed; bottom:25px; right:25px; background:white; color:var(--peach); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; border:2px solid var(--peach); font-size:20px;" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</div>

    <div id="adminOverlay" onclick="closeAdmin()"></div>
    <div id="adminPanel">
        <h2 style="color:var(--peach); margin-top:0;">Staff Dashboard</h2>
        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">Submission Queue</h3>
        <div id="pendingList">Scanning...</div>

        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">
        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">Tag Manager</h3>
        <div id="tagManagerList" style="margin-bottom:10px;"></div>
        <div style="display:flex; gap:10px;">
            <input id="newTagName" placeholder="New Tag..." style="margin:0;">
            <button onclick="addTag()" style="width:100px; padding:10px;">Add</button>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">
        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">System Wallpaper</h3>
        <input id="bgUrl" placeholder="Direct Image Link (URL)">
        <button onclick="changeBackground()" style="background:#444;">Apply Background</button>

        <button onclick="closeAdmin()" style="background:#eee; color:#666; margin-top:25px;">Close Panel</button>
        <div class="version-tag">SOHP-SYS V.25.0.3</div>
    </div>

    <div class="main-ui">
        <h1>🌸 SOHP GUIDES</h1>
        <div class="grid">
            <div>
                <div class="card" style="border-top: 5px solid var(--peach);">
                    <h2 style="margin-top:0; color:var(--peach);">Create Guide</h2>
                    <input id="guideTitle" placeholder="Guide Title">
                    <select id="postCategory"></select>
                    <textarea id="guideContent" placeholder="Write your full guide here..." rows="5"></textarea>
                    <input type="file" id="guideFile" accept="image/*,video/*">
                    <button onclick="submitGuide()">Submit for Approval ✨</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="searchBar" placeholder="Search guides..." onkeyup="runFilters()" style="margin:0;">
                    <select id="filterCategory" onchange="runFilters()" style="margin:0; width:150px;"></select>
                </div>
                <div id="guides-list"></div>
            </div>
            <div>
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    let adminUnlocked = false;

    function openAdmin() {
        if(!adminUnlocked) { if(prompt("Staff Password?") === 'skibidi') adminUnlocked = true; else return; }
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminOverlay').style.display = 'block';
        loadAdmin();
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminOverlay').style.display = 'none'; }

    function getMediaHTML(url) {
        if(!url) return "";
        const ext = url.split('.').pop().toLowerCase().split('?')[0];
        const isVideo = ['mp4', 'webm', 'mov'].includes(ext);
        let media = isVideo ? `<video controls src="${url}"></video>` : `<img src="${url}">`;
        return `<div class="media-container">${media}</div><a href="${url}" download class="download-btn">Download File 📥</a>`;
    }

    async function load() {
        const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
        if (bg) document.getElementById('bg').style.backgroundImage = `url('${bg.value}')`;

        const { data: cats } = await client.from("guide_categories").select("*");
        const f = document.getElementById('filterCategory'); const p = document.getElementById('postCategory');
        f.innerHTML = '<option value="All">All Tags</option>'; p.innerHTML = '';
        cats?.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; p.innerHTML += `<option value="${c.name}">${c.name}</option>`; });

        const { data: gs } = await client.from("Euides").select("*").eq("approved", true).order("created_at", {ascending: false});
        const gDiv = document.getElementById("guides-list"); gDiv.innerHTML = "";
        gs?.forEach(g => {
            gDiv.innerHTML += `<div class="card" data-category="${g.category}">
                <span style="font-size:10px; font-weight:800; color:var(--peach); text-transform:uppercase;">${g.category}</span>
                <h3 style="margin:5px 0;">${g.title}</h3>
                <p style="white-space:pre-wrap; font-size:14px; color:#444; line-height:1.6;">${g.content}</p>
                ${getMediaHTML(g.image_url)}
            </div>`;
        });

        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const uDiv = document.getElementById("updates-list"); uDiv.innerHTML = "";
        us?.forEach(u => {
            uDiv.innerHTML += `<div class="card" style="padding:15px; border-left:6px solid var(--peach);">
                <div style="font-size:10px; color:#999; margin-bottom:5px;">📅 ${new Date(u.created_at).toLocaleDateString()}</div>
                <p style="margin:0; font-size:14px;">${u.content}</p>
            </div>`;
        });
    }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const pDiv = document.getElementById("pendingList"); pDiv.innerHTML = p?.length ? "" : "No guides awaiting review.";
        p?.forEach(i => {
            pDiv.innerHTML += `<div style="background:#f9fafb; padding:20px; border-radius:20px; margin-bottom:15px; border:1px solid #eee;">
                <h4 style="margin:0; color:var(--peach);">${i.title}</h4>
                <div style="font-size:12px; color:#666; margin:5px 0;">Tag: ${i.category}</div>
                <div style="background:#fff; padding:15px; border-radius:12px; font-size:13px; white-space:pre-wrap; border:1px solid #eee; margin:10px 0;">${i.content}</div>
                ${getMediaHTML(i.image_url)}
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="approve(${i.id})" style="background:#2ecc71;">Approve ✅</button>
                    <button onclick="del('Euides', ${i.id})" style="background:#ff4d4d;">Delete 🗑️</button>
                </div>
            </div>`;
        });

        const { data: cats } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagManagerList"); tDiv.innerHTML = "";
        cats?.forEach(c => {
            tDiv.innerHTML += `<div style="display:flex; justify-content:space-between; background:#f3f4f6; padding:8px 15px; border-radius:10px; margin-bottom:5px;">
                <span>${c.name}</span><span style="color:red; cursor:pointer; font-weight:bold;" onclick="del('guide_categories', ${c.id})">×</span>
            </div>`;
        });
    }

    async function submitGuide() {
        const t = document.getElementById("guideTitle").value, c = document.getElementById("guideContent").value, cat = document.getElementById("postCategory").value, f = document.getElementById("guideFile").files[0];
        if(!t || !c) return alert("Please add title and content!");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false}]);
        alert("Submitted for review!"); location.reload();
    }

    async function approve(id) { await client.from("Euides").update({approved:true}).eq("id", id); load(); loadAdmin(); }
    async function addTag() { const n = document.getElementById('newTagName').value; if(n) { await client.from("guide_categories").insert([{name: n}]); load(); loadAdmin(); } }
    async function changeBackground() { await client.from("site_settings").upsert({id: "wallpaper", value: document.getElementById('bgUrl').value}); location.reload(); }
    window.del = async (t, id) => { if(confirm("Permanently delete?")) { await client.from(t).delete().eq("id", id); location.reload(); } };

    function runFilters() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const cat = document.getElementById('filterCategory').value;
        document.querySelectorAll('#guides-list .card').forEach(c => {
            const match = c.innerText.toLowerCase().includes(q) && (cat === "All" || c.dataset.category === cat);
            c.style.display = match ? 'block' : 'none';
        });
    }

    window.onload = load;
</script>
</body>
</html>
