<style>
    /* ... (previous styles) ... */
    .floating-tools { z-index: 99999 !important; } /* High z-index to stay above blur */
    .eye-btn { background: white; color: var(--peach); position: relative; }
    
    /* Ensure the eye is ALWAYS visible even in wallpaper mode */
    body.wallpaper-mode .main-ui, 
    body.wallpaper-mode .circle-btn:not(.eye-btn) { 
        opacity: 0; 
        pointer-events: none; 
    }
    
    .file-badge {
        display: inline-block;
        padding: 4px 8px;
        background: #e2e8f0;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 800;
        margin-bottom: 10px;
    }
</style>

<div class="floating-tools">
    <button class="circle-btn" onclick="openAdmin()">⚙️</button>
    <button class="circle-btn eye-btn" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</button>
</div>

<script>
    // ... (keep your client init and auth logic)

    // NEW: Helper to identify and display file types
    function getFileType(url) {
        if (!url) return "Text Only";
        const ext = url.split('.').pop().toLowerCase();
        if (['mp4', 'webm', 'mov'].includes(ext)) return "VIDEO (" + ext.toUpperCase() + ")";
        if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return "IMAGE (" + ext.toUpperCase() + ")";
        if (['pdf', 'doc', 'docx'].includes(ext)) return "DOCUMENT (" + ext.toUpperCase() + ")";
        return "FILE (" + ext.toUpperCase() + ")";
    }

    // UPDATED: Staff Review Panel with full details and download
    async function loadAdmin() {
        const { data: p, error } = await client.from("Euides").select("*").eq("approved", false);
        const div = document.getElementById('pendingList');
        if (error) { div.innerHTML = "Error loading queue."; return; }
        
        div.innerHTML = p?.length ? "" : "None pending.";
        p?.forEach(i => {
            const fType = getFileType(i.image_url);
            div.innerHTML += `
            <div style="padding:20px; border:2px solid #eee; border-radius:15px; margin-bottom:15px; background:#f9f9f9;">
                <span class="file-badge">${fType}</span>
                <h3 style="margin:5px 0;">${i.title}</h3>
                <p style="font-size:13px; color:#666; max-height:60px; overflow:hidden;">${i.content}</p>
                
                ${i.image_url ? `
                    <div style="margin:10px 0;">
                        <a href="${i.image_url}" target="_blank" style="color:blue; font-size:12px; font-weight:bold;">[View/Download Attachment]</a>
                    </div>
                ` : ''}

                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="approve(${i.id})" style="background:#22c55e; flex:1;">Approve</button>
                    <button onclick="deleteItem('Euides', ${i.id})" style="background:#ef4444; flex:1;">Reject</button>
                </div>
            </div>`;
        });
    }

    // UPDATED: Public Details Modal with Download Button
    function openDetails(g) {
        activeGuideId = g.id;
        const fType = getFileType(g.image_url);
        let mediaContent = "";

        if (g.image_url) {
            const isVid = g.image_url.match(/\.(mp4|mov|webm)$/i);
            mediaContent = `
                <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                    <span class="file-badge">${fType}</span><br>
                    ${isVid ? 
                        `<video controls src="${g.image_url}" style="width:100%; border-radius:12px;"></video>` : 
                        `<img src="${g.image_url}" style="width:100%; border-radius:12px;">`
                    }
                    <br>
                    <a href="${g.image_url}" download target="_blank" 
                       style="display:inline-block; margin-top:15px; background:#f1f5f9; padding:10px 20px; border-radius:10px; text-decoration:none; color:black; font-weight:bold; border:1px solid #ddd;">
                       📥 Download Source File
                    </a>
                </div>`;
        }

        document.getElementById('modal-body').innerHTML = `
            ${isStaff ? `<button onclick="deleteItem('Euides', ${g.id})" style="background:red; float:right; padding:5px 10px; font-size:11px;">Admin Delete</button>` : ''}
            <h1 style="margin-bottom:5px;">${g.title}</h1>
            <span style="color:var(--peach); font-weight:800; font-size:14px;">#${g.category}</span>
            <p style="white-space:pre-wrap; line-height:1.6; margin-top:20px;">${g.content}</p>
            ${mediaContent}
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
        loadComments(g.id);
    }
</script>
