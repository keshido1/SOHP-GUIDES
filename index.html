<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V14 Ultra Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --peach: #ff8e6e; 
            --neon: #ff6b42;
            --glass: rgba(255, 255, 255, 0.96); 
            --card-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #1a1a1a; color: #111; line-height: 1.6;
        }

        /* Background blur is now more intense for text readability */
        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; z-index: -1; 
            filter: blur(15px) brightness(0.5); transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.wallpaper-mode .bg-layer { filter: blur(0px) brightness(1); }
        body.wallpaper-mode .main-ui, body.wallpaper-mode .admin-trigger { opacity: 0; pointer-events: none; }

        .main-ui { transition: 0.4s ease; padding: 20px; }
        .container { display: flex; max-width: 1200px; margin: 0 auto; gap: 30px; flex-wrap: wrap; justify-content: center; }

        h1 { 
            font-size: 3rem; color: white; text-align: center; margin-bottom: 30px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5); letter-spacing: -1px;
        }

        .main-col { flex: 2; min-width: 350px; }
        .side-col { flex: 1; min-width: 300px; }

        /* Card Styling */
        .card { 
            background: var(--glass); border-radius: 24px; padding: 30px; 
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; box-shadow: var(--card-shadow);
        }

        .card h3 { font-size: 1.5rem; color: #000; margin-top: 0; font-weight: 800; }
        .card p { font-size: 1.1rem; color: #444; }

        /* Search & Filter Bar */
        .search-row { 
            display: flex; gap: 15px; margin-bottom: 30px; 
            background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; 
            border-radius: 16px; font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--peach); outline: none; box-shadow: 0 0 10px rgba(255,142,110,0.3); }

        button { 
            background: var(--peach); color: white; border: none; padding: 15px; 
            border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--neon); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,66,0.3); }

        /* Tag Styling */
        .tag-badge { 
            background: var(--peach); color: white; padding: 6px 14px; 
            border-radius: 10px; font-size: 12px; font-weight: 800; 
            text-transform: uppercase; margin-bottom: 12px; display: inline-block;
        }

        /* Admin UI */
        .admin-trigger { position: fixed; bottom: 90px; right: 25px; background: #222; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #444; color: white; z-index: 100; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .toggle-ui { position: fixed; bottom: 20px; right: 25px; background: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--peach); color: var(--peach); z-index: 100; font-size: 28px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        #adminPanel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95%; max-width: 600px; max-height: 85vh; overflow-y: auto; 
            background: white; z-index: 1001; border-radius: 32px; padding: 40px; 
            display: none; border: 4px solid var(--peach);
        }
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; }

        .cat-manager-item { display: flex; justify-content: space-between; background: #f8f8f8; padding: 12px; border-radius: 12px; margin: 8px 0; border: 1px solid #eee; }
        .delete-btn { position: absolute; top: 20px; right: 20px; color: #ff4d4d; cursor: pointer; font-size: 22px; }
        .hidden { display: none !important; }

        @media (max-width: 768px) { .container { flex-direction: column; } .search-row { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="bg-layer" id="bg"></div>
    
    <div class="admin-trigger" onclick="openAdmin()">⚙️</div>
    <div class="toggle-ui" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</div>
