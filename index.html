<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - Ultimate Restore</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --outline: #cbd5e1; }
        #site-bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -9999; background: #1a1a1a no-repeat center center; background-size: cover; }
        #bg-blur-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(20px) brightness(0.6); background: rgba(0,0,0,0.3); transition: 0.5s; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; background: transparent !important; }

        body.wallpaper-mode .main-ui { opacity: 0; pointer-events: none; }
        body.wallpaper-mode #bg-blur-overlay { backdrop-filter: blur(0px) brightness(1); background: transparent; }

        .main-ui { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; transition: 0.5s; }
        .user-auth-bar { background: var(--glass); padding: 15px 25px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .content-layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

        .preview-card { background: var(--glass); border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .preview-thumb { width: 100%; height: 140px; object-fit: cover; background: #000; }
        .pin-tag { position: absolute; top: 10px; left: 10px; background: var(--peach); color: white; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        
        #modalOverlay, #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .panel-content { background: white; width: 95%; max-width: 850px; max-height: 90vh; border-radius: 30px; overflow-y: auto; padding: 40px; position: relative; }

        .floating-tools { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        button { background: var(--peach); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-sec { background: #f1f5f9; color: #475569; }
        input, textarea, select { padding: 12px; border-radius: 12px; border: 2px solid var(--outline); width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .tag-row { display: flex; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 12px; margin-bottom: 5px; align-items: center; }
        .file-badge { background: #e2e8f0; padding: 3px 7px; border-radius: 5px; font-size: 10px; font-weight: 800; margin-bottom: 5px; display: inline-block; }
        .hidden { display: none !important; }
        
        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="site-bg-layer"><div id="bg-blur-overlay"></div></div>

    <div class="floating-tools">
        <button class="circle-btn" style="background:#1e293b; color:white;" onclick="openAdmin()">⚙️</button>
        <button class="circle-btn" style="background:white; color:var(--peach);" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</button>
    </div>

    <div id="modalOverlay" onclick="closeModals(event)"><div class="panel-content" id="modal-body"></div></div>

    <div id="adminOverlay" onclick="closeModals(event)">
        <div class="panel-content">
            <h2 style="color:var(--peach); margin-bottom:20px;">Staff Command Center 🔒</h2>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                <div>
                    <h3 style="margin-top:0;">📝 Review Queue</h3>
                    <div id="pendingList" style="max-height:400px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:15px;">Scanning...</div>
                </div>

                <div>
                    <h3 style="margin-top:0;">🏷️ Tag Manager</h3>
                    <div id="tagManagerList"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input id="newTagName" placeholder="Tag Name..." style="margin:0;">
                        <button onclick="addTag()">Add</button>
                    </div>

                    <hr style="margin:20px 0;">
                    <h3>📢 Announcements</h3>
                    <textarea id="bcContent" placeholder="Write update..."></textarea>
                    <button onclick="postUpdate()" style="width:100%; background:#0f172a;">Post Update</button>

                    <hr style="margin:20px 0;">
                    <h3>🖼️ Background</h3>
                    <input id="bgUrlInput" placeholder="Wallpaper Image URL">
                    <button onclick="updateWallpaper()" style="width:100%; background:#475569;">Set Wallpaper</button>
                </div>
            </div>
        </div>
    </div>

    <div class="main-ui">
        <h1 style="color:white; text-align:center; font-size:3rem; text-shadow:0 4px 20px rgba(0,0,0,0.6); margin-bottom:30px;">🌸 SOHP GUIDES</h1>

        <div class="user-auth-bar">
            <div id="user-info" style="font-weight:800;">Guest Mode</div>
            <div id="auth-controls">
                <input id="auth-email" type="email" placeholder="Email" style="width:140px; margin:0;">
                <input id="auth-pass" type="password" placeholder="Pass" style="width:100px; margin:0;">
                <button onclick="handleAuth('signup')">Join</button>
                <button onclick="handleAuth('login')" style="background:#0f172a;">Login</button>
            </div>
            <div id="logged-in-controls" class="hidden">
                <button onclick="client.auth.signOut().then(()=>location.reload())" style="background:#ef4444;">Logout</button>
            </div>
        </div>

        <div class="content-layout">
            <div>
                <div style="background:var(--glass); padding:25px; border-radius:25px; border-top:6px solid var(--peach);">
                    <h3>Submit New Guide</h3>
                    <input id="gTitle" placeholder="Guide Title">
                    <div style="display:flex; gap:10px; margin:10px 0;">
                        <select id="gCat"></select>
                        <input type="file" id="gFile">
                    </div>
                    <textarea id="gContent" placeholder="Paste guide content here..." rows="3"></textarea>
                    <button onclick="submitGuide()" style="width:100%; margin-top:10px;">Submit for Review ✨</button>
                </div>

                <div style="display:flex; gap:10px; margin:25px 0;">
                    <input type="text" id="search" placeholder="Search..." onkeyup="loadGuides()" style="margin:0;">
                    <select id="fCat" onchange="loadGuides()" style="width:140px; margin:0;"></select>
                </div>

                <div id="guide-grid" class="guide-grid"></div>
            </div>

            <div>
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Recent Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    
    let isStaff = false;

    function staffOnly() {
        if (isStaff) return true;
        const p = prompt("Enter Staff Password:");
        if (p === 'skibidi') { isStaff = true; return true; }
        alert("Incorrect Password!"); return false;
    }

    function getExt(url) { if(!url) return "TXT"; return url.split('.').pop().split(/[?#]/)[0].toUpperCase(); }

    async function load() {
        try {
            const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
            if(bg?.value) document.getElementById('site-bg-layer').style.backgroundImage = `url('${bg.value}')`;

            const { data: cats } = await client.from("guide_categories").select("*");
            const f = document.getElementById('fCat'), g = document.getElementById('gCat');
            f.innerHTML = '<option value="All">All Categories</option>'; g.innerHTML = '';
            cats?.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; g.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
            
            loadGuides();
            loadUpdates();
        } catch(e) { console.error(e); }
    }

    async function loadGuides() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        let query = client.from("Euides").select("*").eq("approved", true).order("pinned", {ascending: false}).order("created_at", {ascending: false});
        if(cat !== "All") query = query.eq("category", cat);
        const { data: gs } = await query;
        const grid = document.getElementById('guide-grid'); grid.innerHTML = "";
        gs?.filter(g => g.title.toLowerCase().includes(q)).forEach(g => {
            grid.innerHTML += `
                <div class="preview-card" onclick='openDetails(${JSON.stringify(g).replace(/'/g, "&apos;")})'>
                    ${g.pinned ? `<div class="pin-tag">📌 PINNED</div>` : ''}
                    <img class="preview-thumb" src="${g.image_url || 'https://via.placeholder.com/300x140?text=SOHP'}">
                    <div style="padding:15px;">
                        <h4 style="margin:5px 0;">${g.title}</h4>
                        <div style="font-size:11px; color:#666;">👁️ ${g.views || 0} views</div>
                    </div>
                </div>`;
        });
    }

    async function openDetails(g) {
        await client.from("Euides").update({ views: (g.views || 0) + 1 }).eq("id", g.id);
        const ext = getExt(g.image_url);
        document.getElementById('modal-body').innerHTML = `
            ${isStaff ? `
                <div style="float:right; display:flex; gap:8px;">
                    <button class="btn-sec" onclick="togglePin(${g.id}, ${g.pinned})">${g.pinned ? 'Unpin' : 'Pin'}</button>
                    <button class="btn-sec" onclick="editGuide(${g.id}, '${g.title}', \`${g.content}\`)">✏️ Edit</button>
                    <button onclick="deleteItem('Euides', ${g.id})" style="background:#ef4444;">🗑️ Delete</button>
                </div>
            ` : ''}
            <h1>${g.title}</h1>
            <p style="white-space:pre-wrap; line-height:1.6;">${g.content}</p>
            ${g.image_url ? `<a href="${g.image_url}" download target="_blank" style="display:block; background:#0f172a; color:white; text-align:center; padding:15px; border-radius:15px; text-decoration:none; font-weight:800; margin-top:20px;">📥 Download ${ext} File</a>` : ''}
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    async function togglePin(id, cur) { if(!staffOnly()) return; await client.from("Euides").update({pinned: !cur}).eq("id", id); location.reload(); }
    async function editGuide(id, oldT, oldC) { if(!staffOnly()) return; const nt = prompt("Edit Title:", oldT), nc = prompt("Edit Content:", oldC); if(nt && nc) { await client.from("Euides").update({title:nt, content:nc}).eq("id", id); location.reload(); } }
    async function deleteItem(table, id) { if(!staffOnly()) return; if(confirm("Permanently delete this?")) { await client.from(table).delete().eq("id", id); location.reload(); } }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const div = document.getElementById('pendingList'); div.innerHTML = p?.length ? "" : "None.";
        p?.forEach(i => {
            div.innerHTML += `
            <div style="padding:10px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px; background:white;">
                <span class="file-badge">${getExt(i.image_url)}</span>
                <h4 style="margin:5px 0;">${i.title}</h4>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button onclick="approve(${i.id})" style="background:#22c55e; flex:1; font-size:12px;">Approve</button>
                    <button onclick="editGuide(${i.id}, '${i.title}', \`${i.content}\` )" style="background:#475569; flex:1; font-size:12px;">Edit</button>
                    <button onclick="deleteItem('Euides', ${i.id})" style="background:#ef4444; flex:1; font-size:12px;">Reject</button>
                </div>
            </div>`;
        });
        const { data: cats } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagManagerList"); tDiv.innerHTML = "";
        cats?.forEach(c => { tDiv.innerHTML += `<div class="tag-row"><span>${c.name}</span><button style="background:none; color:red; padding:0;" onclick="deleteItem('guide_categories', ${c.id})">🗑️</button></div>`; });
    }

    function openAdmin() { if(staffOnly()) { document.getElementById('adminOverlay').style.display = 'flex'; loadAdmin(); } }
    async function addTag() { if(!staffOnly()) return; const n = document.getElementById('newTagName').value; if(n) { await client.from("guide_categories").insert([{name: n}]); loadAdmin(); load(); } }
    async function postUpdate() { if(!staffOnly()) return; const c = document.getElementById('bcContent').value; await client.from("community_updates").insert([{content: c}]); location.reload(); }
    async function updateWallpaper() { if(!staffOnly()) return; await client.from("site_settings").upsert({id: "wallpaper", value: document.getElementById('bgUrlInput').value}); location.reload(); }
    async function approve(id) { if(!staffOnly()) return; await client.from("Euides").update({approved:true}).eq("id", id); loadAdmin(); loadGuides(); }
    
    async function loadUpdates() {
        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const div = document.getElementById("updates-list"); div.innerHTML = "";
        us?.forEach(u => { div.innerHTML += `<div style="background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid var(--peach); position:relative;">
            ${isStaff ? `<button style="position:absolute; right:10px; top:10px; background:none; color:red; font-size:12px;" onclick="deleteItem('community_updates', ${u.id})">🗑️</button>` : ''}
            ${u.content}</div>`; });
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        if(!t || !c) return alert("Fill out title and content!");
        let url = null; if(f) {
            const name = Date.now() + "_" + f.name; await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false, views:0, pinned:false}]);
        alert("Submitted!"); location.reload();
    }

    function closeModals(e) { if(e.target.id.includes('Overlay')) e.target.style.display = 'none'; }
    window.onload = load;
</script>
</body>
</html>
