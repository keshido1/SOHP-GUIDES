<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - Fixed & Restored</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --outline: #cbd5e1; }
        #site-bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -9999; background: #1a1a1a no-repeat center center; background-size: cover; }
        #bg-blur-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(20px) brightness(0.6); background: rgba(0,0,0,0.3); transition: 0.5s; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; background: transparent !important; }

        /* Wallpaper Mode */
        body.wallpaper-mode .main-ui { opacity: 0; pointer-events: none; }
        body.wallpaper-mode #bg-blur-overlay { backdrop-filter: blur(0px) brightness(1); background: transparent; }

        .main-ui { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; transition: 0.5s; }
        .content-layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

        .preview-card { background: var(--glass); border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid rgba(0,0,0,0.05); }
        .preview-thumb { width: 100%; height: 140px; object-fit: cover; background: #000; }
        
        #modalOverlay, #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .panel-content { background: white; width: 95%; max-width: 900px; max-height: 90vh; border-radius: 30px; overflow-y: auto; padding: 40px; position: relative; }

        .floating-tools { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        button { background: var(--peach); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-red { background: #ef4444 !important; }
        .btn-gray { background: #475569 !important; }
        input, textarea, select { padding: 12px; border-radius: 12px; border: 2px solid var(--outline); width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .admin-box { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="site-bg-layer"><div id="bg-blur-overlay"></div></div>

    <div class="floating-tools">
        <button class="circle-btn" style="background:#1e293b; color:white;" onclick="openAdmin()">⚙️</button>
        <button class="circle-btn" style="background:white; color:var(--peach);" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</button>
    </div>

    <div id="modalOverlay" onclick="closeModals(event)"><div class="panel-content" id="modal-body"></div></div>

    <div id="adminOverlay" onclick="closeModals(event)">
        <div class="panel-content">
            <h1 style="color:var(--peach);">Staff Dashboard</h1>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="admin-box">
                    <h3>📝 Guide Reviewer</h3>
                    <div id="pendingList">Scanning for new submissions...</div>
                </div>

                <div>
                    <div class="admin-box">
                        <h3>🏷️ Tag Manager</h3>
                        <div id="tagManagerList" style="margin-bottom:10px;"></div>
                        <div style="display:flex; gap:5px;">
                            <input id="newTagName" placeholder="New Tag..." style="margin:0;">
                            <button onclick="addTag()">Add</button>
                        </div>
                    </div>

                    <div class="admin-box">
                        <h3>📢 Announcements</h3>
                        <textarea id="bcContent" placeholder="New update text..."></textarea>
                        <button onclick="postUpdate()" style="width:100%; background:#0f172a;">Post Update</button>
                    </div>

                    <div class="admin-box">
                        <h3>🖼️ Wallpaper</h3>
                        <input id="bgUrlInput" placeholder="Image URL">
                        <button onclick="updateWallpaper()" style="width:100%;" class="btn-gray">Save Wallpaper</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-ui">
        <h1 style="color:white; text-align:center; font-size:3rem; text-shadow:0 4px 20px rgba(0,0,0,0.6); margin-bottom:30px;">🌸 SOHP GUIDES</h1>

        <div class="content-layout">
            <div>
                <div style="background:var(--glass); padding:25px; border-radius:25px; border-top:6px solid var(--peach); margin-bottom:30px;">
                    <h3>Submit New Guide</h3>
                    <input id="gTitle" placeholder="Guide Title">
                    <div style="display:flex; gap:10px; margin:10px 0;">
                        <select id="gCat"></select>
                        <input type="file" id="gFile">
                    </div>
                    <textarea id="gContent" placeholder="Describe the guide here..." rows="3"></textarea>
                    <button onclick="submitGuide()" style="width:100%;">Submit Guide ✨</button>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="search" placeholder="Search..." onkeyup="loadGuides()" style="margin:0;">
                    <select id="fCat" onchange="loadGuides()" style="width:140px; margin:0;"></select>
                </div>

                <div id="guide-grid" class="guide-grid"></div>
            </div>

            <div>
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Staff Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    
    let isStaff = false;

    // Simplified password check
    function openAdmin() {
        if (!isStaff) {
            const p = prompt("Staff Password:");
            if (p !== 'skibidi') return alert("Access Denied");
            isStaff = true;
        }
        document.getElementById('adminOverlay').style.display = 'flex';
        loadAdmin();
    }

    async function load() {
        const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
        if(bg?.value) document.getElementById('site-bg-layer').style.backgroundImage = `url('${bg.value}')`;

        const { data: cats } = await client.from("guide_categories").select("*");
        const f = document.getElementById('fCat'), g = document.getElementById('gCat');
        f.innerHTML = '<option value="All">All Tags</option>'; g.innerHTML = '';
        cats?.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; g.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
        
        loadGuides();
        loadUpdates();
    }

    async function loadGuides() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        let query = client.from("Euides").select("*").eq("approved", true).order("pinned", {ascending: false}).order("created_at", {ascending: false});
        if(cat !== "All") query = query.eq("category", cat);
        const { data: gs } = await query;
        const grid = document.getElementById('guide-grid'); grid.innerHTML = "";
        gs?.filter(g => g.title.toLowerCase().includes(q)).forEach(g => {
            grid.innerHTML += `
                <div class="preview-card" onclick='openDetails(${JSON.stringify(g).replace(/'/g, "&apos;")})'>
                    <img class="preview-thumb" src="${g.image_url || 'https://via.placeholder.com/300x140?text=SOHP'}">
                    <div style="padding:15px;">
                        <h4>${g.title}</h4>
                        <div style="font-size:11px; color:#666;">👁️ ${g.views || 0} views</div>
                    </div>
                </div>`;
        });
    }

    async function openDetails(g) {
        await client.from("Euides").update({ views: (g.views || 0) + 1 }).eq("id", g.id);
        const ext = g.image_url ? g.image_url.split('.').pop().split(/[?#]/)[0].toUpperCase() : "TXT";
        document.getElementById('modal-body').innerHTML = `
            ${isStaff ? `<div style="float:right; display:flex; gap:5px;">
                <button class="btn-gray" onclick="togglePin(${g.id}, ${g.pinned})">${g.pinned ? 'Unpin' : 'Pin'}</button>
                <button class="btn-gray" onclick="editGuide(${g.id}, '${g.title}', \`${g.content}\`)">Edit</button>
                <button class="btn-red" onclick="deleteItem('Euides', ${g.id})">Delete</button>
            </div>` : ''}
            <h1>${g.title}</h1>
            <p style="white-space:pre-wrap; line-height:1.6;">${g.content}</p>
            ${g.image_url ? `<a href="${g.image_url}" download target="_blank" style="display:block; background:#0f172a; color:white; text-align:center; padding:15px; border-radius:15px; text-decoration:none; font-weight:800; margin-top:20px;">Download ${ext} File</a>` : ''}
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    async function loadAdmin() {
        // 1. Load Submissions
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const div = document.getElementById('pendingList'); div.innerHTML = p?.length ? "" : "None.";
        p?.forEach(i => {
            div.innerHTML += `
            <div style="padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px; background:white;">
                <h4>${i.title}</h4>
                <p style="font-size:11px; color:#777;">${i.content.substring(0,80)}...</p>
                ${i.image_url ? `<img src="${i.image_url}" style="width:60px; border-radius:5px; margin-bottom:10px;">` : ''}
                <div style="display:flex; gap:5px;">
                    <button onclick="approve(${i.id})" style="background:#22c55e; flex:1;">Approve</button>
                    <button onclick="editGuide(${i.id}, '${i.title}', \`${i.content}\` )" class="btn-gray" style="flex:1;">Edit</button>
                    <button onclick="deleteItem('Euides', ${i.id})" class="btn-red" style="flex:1;">Reject</button>
                </div>
            </div>`;
        });

        // 2. Load Tags
        const { data: cats } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagManagerList"); tDiv.innerHTML = "";
        cats?.forEach(c => { 
            tDiv.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                <span>${c.name}</span>
                <button onclick="deleteItem('guide_categories', ${c.id})" style="background:none; color:red; padding:0;">🗑️</button>
            </div>`; 
        });
    }

    async function approve(id) { await client.from("Euides").update({approved:true}).eq("id", id); loadAdmin(); loadGuides(); }
    async function editGuide(id, oldT, oldC) { const nt = prompt("Title:", oldT), nc = prompt("Content:", oldC); if(nt && nc) { await client.from("Euides").update({title:nt, content:nc}).eq("id", id); location.reload(); } }
    async function deleteItem(table, id) { if(confirm("Delete forever?")) { await client.from(table).delete().eq("id", id); location.reload(); } }
    async function addTag() { const n = document.getElementById('newTagName').value; if(n) { await client.from("guide_categories").insert([{name: n}]); loadAdmin(); load(); } }
    async function postUpdate() { await client.from("community_updates").insert([{content: document.getElementById('bcContent').value}]); location.reload(); }
    async function updateWallpaper() { await client.from("site_settings").upsert({id: "wallpaper", value: document.getElementById('bgUrlInput').value}); location.reload(); }
    async function togglePin(id, cur) { await client.from("Euides").update({pinned: !cur}).eq("id", id); location.reload(); }

    async function loadUpdates() {
        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const div = document.getElementById("updates-list"); div.innerHTML = "";
        us?.forEach(u => { div.innerHTML += `
            <div style="background:var(--glass); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid var(--peach); position:relative;">
                ${isStaff ? `<button style="position:absolute; right:10px; top:10px; background:none; color:red;" onclick="deleteItem('community_updates', ${u.id})">🗑️</button>` : ''}
                ${u.content}
            </div>`; 
        });
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false, views:0, pinned:false}]);
        alert("Submitted!"); location.reload();
    }

    function closeModals(e) { if(e.target.id.includes('Overlay')) e.target.style.display = 'none'; }
    window.onload = load;
</script>
</body>
</html>
