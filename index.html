<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides & Updates</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    
    <style>
        /* ANIME PEACH PALETTE */
        :root {
            --bg: #fff5f0;        /* Light Peach Cream */
            --card-bg: #ffffff;
            --accent: #ff8e6e;    /* Salmon/Peach Accent */
            --border: #ffdbc5;    /* Soft Peach Border */
            --text: #5d4a44;      /* Warm Brown Text */
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
        }

        .layout { 
            display: flex; 
            max-width: 1200px; 
            margin: 0 auto; 
            gap: 25px; 
            flex-wrap: wrap; 
        }

        /* Sections */
        .guides-column { flex: 2; min-width: 350px; }
        .updates-column { flex: 1; min-width: 300px; }

        /* Peach Cards */
        .peach-card { 
            background: var(--card-bg); 
            border: 2px solid var(--border); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 6px 15px rgba(255, 142, 110, 0.1);
            position: relative;
        }

        h1, h2 { color: var(--accent); margin-top: 0; }

        /* Inputs */
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box;
            background: #fffcfb;
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
        }

        /* The Trash Icon Button */
        .trash-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            color: var(--border);
        }
        .trash-btn:hover { color: #ff4d4d; }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: var(--border);
            color: var(--text);
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        img { max-width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid var(--bg); }
    </style>
</head>
<body>

<div class="layout">
    <div class="guides-column">
        <h1>🌸 SOHP Guides</h1>
        <div class="peach-card">
            <h2>New Guide</h2>
            <input id="title" placeholder="Guide title">
            <textarea id="content" placeholder="Instructions..." rows="3"></textarea>
            <input type="file" id="fileInput">
            <button id="postBtn">Post Guide ✨</button>
        </div>
        <div id="guides-list">Loading guides...</div>
    </div>

    <div class="updates-column">
        <h2>✨ Updates</h2>
        <div class="peach-card">
            <textarea id="upContent" placeholder="Announcement..." rows="2"></textarea>
            <button id="upBtn" style="background: #5d4a44;">Post Update</button>
        </div>
        <div id="updates-list">Loading updates...</div>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        "https://ioruwtajlnnxxqmgxugn.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
    );

    async function refreshDisplay() {
        try {
            // Fetch Guides
            const { data: guides } = await supabaseClient.from("Euides").select("*").order("created_at", { ascending: false });
            const gList = document.getElementById("guides-list");
            gList.innerHTML = "";
            guides.forEach(item => {
                let fileHTML = "";
                if (item.image_url) {
                    const isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(item.image_url);
                    fileHTML = isImg ? `<img src="${item.image_url}">` : "";
                    fileHTML += `<br><a href="${item.image_url}" target="_blank" download class="download-link">💾 Download</a>`;
                }
                gList.innerHTML += `
                    <div class="peach-card">
                        <button class="trash-btn" onclick="removeItem('Euides', ${item.id})">🗑️</button>
                        <h3>${item.title}</h3>
                        <p style="white-space: pre-wrap;">${item.content}</p>
                        ${fileHTML}
                    </div>`;
            });

            // Fetch Updates
            const { data: updates } = await supabaseClient.from("community_updates").select("*").order("created_at", { ascending: false });
            const uList = document.getElementById("updates-list");
            uList.innerHTML = "";
            updates.forEach(up => {
                uList.innerHTML += `
                    <div class="peach-card" style="padding:15px; border-left: 6px solid var(--accent);">
                        <button class="trash-btn" onclick="removeItem('community_updates', ${up.id})" style="font-size:14px;">🗑️</button>
                        <p>${up.content}</p>
                        <small>📅 ${new Date(up.created_at).toLocaleDateString()}</small>
                    </div>`;
            });
        } catch (e) { console.error(e); }
    }

    // Handlers
    document.getElementById("postBtn").onclick = async () => {
        const t = document.getElementById("title").value;
        const c = document.getElementById("content").value;
        const f = document.getElementById("fileInput").files[0];
        if(!t || !c) return alert("Missing info! 🌸");
        
        let url = null;
        if (f) {
            const name = Date.now() + "_" + f.name;
            await supabaseClient.storage.from("guide-media").upload(name, f);
            url = supabaseClient.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await supabaseClient.from("Euides").insert([{ title: t, content: c, image_url: url }]);
        location.reload();
    };

    document.getElementById("upBtn").onclick = async () => {
        const c = document.getElementById("upContent").value;
        if(prompt("Admin Password?") === 'skibidi') {
            await supabaseClient.from("community_updates").insert([{ content: c }]);
            location.reload();
        } else { alert("Wrong! ❌"); }
    };

    window.removeItem = async (table, id) => {
        if(prompt("Password to delete?") === 'skibidi') {
            await supabaseClient.from(table).delete().eq("id", id);
            location.reload();
        } else { alert("Wrong! ❌"); }
    };

    window.onload = refreshDisplay;
</script>
</body>
</html>
