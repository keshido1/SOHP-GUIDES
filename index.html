<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - Ultra Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --dark: #1e293b; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #1a1a1a; color: #334; }
        
        #site-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; filter: blur(10px) brightness(0.5); }
        
        .main-ui { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        /* User Bar */
        .user-auth-bar { background: var(--glass); padding: 15px 25px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .auth-inputs { display: flex; gap: 10px; }
        .auth-inputs input { padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; }

        /* Guide Grid */
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Preview Card */
        .preview-card { background: var(--glass); border-radius: 24px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.3); }
        .preview-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .preview-thumb { width: 100%; height: 160px; background: #000; object-fit: cover; }
        .preview-info { padding: 15px; }
        .preview-info h3 { margin: 0; font-size: 18px; color: var(--dark); }
        .tag-pill { font-size: 10px; font-weight: 800; color: var(--peach); text-transform: uppercase; }

        /* Full Details Modal */
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 900px; max-height: 90vh; border-radius: 30px; overflow-y: auto; position: relative; padding: 40px; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        /* Comment System */
        .comment-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .comment-bubble { background: #f1f5f9; padding: 12px 18px; border-radius: 15px; margin-bottom: 10px; font-size: 14px; }
        .comment-user { font-weight: 800; color: var(--peach); margin-bottom: 4px; display: block; }

        button { background: var(--peach); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        input, textarea, select { padding: 12px; border-radius: 12px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="site-bg"></div>

    <div class="main-ui">
        <h1 style="color:white; text-align:center; text-shadow: 0 4px 15px rgba(0,0,0,0.5);">🌸 SOHP GUIDES</h1>

        <div class="user-auth-bar">
            <div id="user-info">Guest User</div>
            <div class="auth-inputs" id="auth-controls">
                <input id="auth-email" type="email" placeholder="Email">
                <input id="auth-pass" type="password" placeholder="Password">
                <button onclick="handleSignup()">Join</button>
                <button onclick="handleLogin()" style="background:#0f172a;">Login</button>
            </div>
            <div id="logged-in-controls" class="hidden">
                <button onclick="client.auth.signOut().then(()=>location.reload())" style="background:#ef4444;">Logout</button>
            </div>
        </div>

        <div style="background:var(--glass); padding:25px; border-radius:25px; margin-bottom:40px;">
            <h2 style="margin:0 0 15px 0; color:var(--peach);">Submit a Guide</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <input id="gTitle" placeholder="Guide Title">
                <select id="gCat"></select>
            </div>
            <textarea id="gContent" placeholder="Full guide details..." rows="3" style="margin-top:10px;"></textarea>
            <input type="file" id="gFile" style="margin-top:10px;">
            <button onclick="submitGuide()" style="margin-top:10px; width:100%;">Post Guide ✨</button>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="search" placeholder="Search guides..." onkeyup="loadGuides()">
            <select id="fCat" onchange="loadGuides()" style="width:150px;"></select>
        </div>

        <div id="guide-grid" class="guide-grid"></div>
    </div>

    <div id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeDetails()">&times;</span>
            <div id="modal-body"></div>
            
            <div class="comment-section">
                <h3>Comments</h3>
                <div id="comment-list"></div>
                <div id="comment-form" class="hidden" style="margin-top:20px;">
                    <textarea id="cInput" placeholder="Add a comment..." rows="2"></textarea>
                    <button onclick="postComment()" style="margin-top:5px;">Post Comment</button>
                </div>
                <p id="comment-login-msg">Log in to leave a comment.</p>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    
    let currentUser = null;
    let activeGuideId = null;

    // --- AUTH LOGIC ---
    client.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user || null;
        if(currentUser) {
            document.getElementById('user-info').innerText = "Welcome, " + currentUser.email;
            document.getElementById('auth-controls').classList.add('hidden');
            document.getElementById('logged-in-controls').classList.remove('hidden');
            document.getElementById('comment-form').classList.remove('hidden');
            document.getElementById('comment-login-msg').classList.add('hidden');
        }
    });

    async function handleSignup() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const { error } = await client.auth.signUp({email, password: pass});
        if(error) alert(error.message); else alert("Check your email for confirmation!");
    }

    async function handleLogin() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const { error } = await client.auth.signInWithPassword({email, password: pass});
        if(error) alert(error.message); else location.reload();
    }

    // --- CORE LOGIC ---
    async function init() {
        // Load Wallpaper
        const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
        if(bg) document.getElementById('site-bg').style.backgroundImage = `url('${bg.value}')`;

        // Load Categories
        const { data: cats } = await client.from("guide_categories").select("*");
        const f = document.getElementById('fCat'), p = document.getElementById('gCat');
        f.innerHTML = '<option value="All">All Tags</option>'; p.innerHTML = '';
        cats?.forEach(c => { 
            f.innerHTML += `<option value="${c.name}">${c.name}</option>`; 
            p.innerHTML += `<option value="${c.name}">${c.name}</option>`; 
        });

        loadGuides();
    }

    async function loadGuides() {
        const search = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        
        let query = client.from("Euides").select("*").eq("approved", true).order("created_at", {ascending: false});
        if(cat !== "All") query = query.eq("category", cat);
        
        const { data: gs } = await query;
        const grid = document.getElementById('guide-grid');
        grid.innerHTML = "";

        gs?.filter(g => g.title.toLowerCase().includes(search)).forEach(g => {
            grid.innerHTML += `
                <div class="preview-card" onclick="openDetails(${JSON.stringify(g).replace(/"/g, '&quot;')})">
                    <img class="preview-thumb" src="${g.image_url || 'https://via.placeholder.com/300x160?text=No+Image'}" onerror="this.src='https://via.placeholder.com/300x160?text=Video+Guide'">
                    <div class="preview-info">
                        <span class="tag-pill">${g.category}</span>
                        <h3>${g.title}</h3>
                        <p style="font-size:12px; color:#666; margin-top:5px;">Click to read more...</p>
                    </div>
                </div>
            `;
        });
    }

    function openDetails(guide) {
        activeGuideId = guide.id;
        const body = document.getElementById('modal-body');
        const media = guide.image_url ? 
            (guide.image_url.match(/\.(mp4|webm|mov)$/i) ? 
                `<video controls src="${guide.image_url}" style="width:100%; border-radius:15px;"></video>` : 
                `<img src="${guide.image_url}" style="width:100%; border-radius:15px;">`) 
            : "";

        body.innerHTML = `
            <span class="tag-pill">${guide.category}</span>
            <h1 style="margin:10px 0;">${guide.title}</h1>
            <p style="font-size:12px; color:#666;">Posted: ${new Date(guide.created_at).toLocaleDateString()}</p>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div style="white-space:pre-wrap; line-height:1.6; font-size:16px;">${guide.content}</div>
            <div style="margin-top:20px;">${media}</div>
        `;
        
        loadComments(guide.id);
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeDetails() { document.getElementById('modalOverlay').style.display = 'none'; }

    async function loadComments(gid) {
        const { data: coms } = await client.from("guide_comments").select("*").eq("guide_id", gid).order("created_at", {ascending: true});
        const list = document.getElementById('comment-list');
        list.innerHTML = coms?.length ? "" : "<p style='font-size:12px; color:#999;'>No comments yet.</p>";
        coms?.forEach(c => {
            list.innerHTML += `
                <div class="comment-bubble">
                    <span class="comment-user">${c.username || 'Anonymous User'}</span>
                    ${c.content}
                </div>
            `;
        });
    }

    async function postComment() {
        const val = document.getElementById('cInput').value;
        if(!val || !currentUser) return;
        
        await client.from("guide_comments").insert([{
            guide_id: activeGuideId,
            user_id: currentUser.id,
            username: currentUser.email.split('@')[0],
            content: val
        }]);
        
        document.getElementById('cInput').value = "";
        loadComments(activeGuideId);
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        if(!t || !c) return alert("Fill out fields.");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false}]);
        alert("Sent for review!"); location.reload();
    }

    init();
</script>
</body>
</html>
