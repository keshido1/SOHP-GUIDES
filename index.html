<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/gensin-impact/images/9/9e/Icon_Emoji_Paimon%27s_Paintings_41_Alice_1.png/revision/latest/scale-to-width-down/250?cb=20250528172355">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V24 Responsive Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.95); }

        html, body { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: #1a1a1a !important;
        }

        /* Fixed Background & Blur */
        .bg-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
        }
        .bg-layer { 
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; 
            background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.6);
        }
        .edge-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            box-shadow: inset 0 0 100px 20px rgba(255, 255, 255, 0.2);
        }

        /* Main Layout */
        .main-ui { padding: 40px 20px; position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; align-items: start; }

        h1 { font-size: 2.5rem; color: white; text-align: center; text-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 40px; }

        /* Flexible Cards */
        .card { 
            background: var(--glass); border-radius: 24px; padding: 25px; 
            margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.3);
            width: 100%; box-sizing: border-box;
            overflow: hidden; /* Prevents text bleeding out */
        }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 8px 0; 
            border: 1px solid #eee; border-radius: 14px; 
            font-family: inherit; font-size: 14px;
            background: white;
        }

        button { 
            background: var(--peach); color: white; border: none; 
            padding: 14px 20px; border-radius: 14px; font-weight: 700; 
            cursor: pointer; transition: 0.2s; width: 100%;
        }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* Admin UI */
        #adminPanel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; 
            background: white; z-index: 1001; border-radius: 30px; padding: 30px; 
            display: none; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; }

        /* Tag Manager Styles */
        .tag-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f8f8; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px;
        }
        .del-tag { color: #ff4d4d; font-weight: 800; cursor: pointer; padding: 5px; }

        /* Floating Controls */
        .admin-btn { position: fixed; bottom: 85px; right: 25px; background: #222; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 2px solid white; }
        .view-btn { position: fixed; bottom: 25px; right: 25px; background: white; color: var(--peach); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 2px solid var(--peach); font-size: 20px; }

        .version { font-size: 10px; color: #ccc; text-align: right; margin-top: 20px; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="bg-viewport"><div class="bg-layer" id="bg"></div></div>
    <div class="edge-glow"></div>
    
    <div class="admin-btn" onclick="openAdmin()">⚙️</div>
    <div class="view-btn" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</div>

    <div id="adminOverlay" onclick="closeAdmin()"></div>
    <div id="adminPanel">
        <h2 style="color:var(--peach); margin-top:0;">Admin Dashboard</h2>
        
        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">Manage Tags</h3>
        <div id="tagList"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input id="newTagName" placeholder="New Tag..." style="margin:0;">
            <button onclick="addTag()" style="width:80px; padding:10px;">Add</button>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">

        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">Review Guides</h3>
        <div id="pendingQueue"></div>

        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">

        <h3 style="font-size:12px; color:#999; text-transform:uppercase;">Announcements</h3>
        <textarea id="announcementText" placeholder="Broadcast a message..."></textarea>
        <button onclick="postBroadcast()" style="background:#222;">Post Update</button>

        <button onclick="closeAdmin()" style="background:#eee; color:#666; margin-top:20px;">Close</button>
        <div class="version">V.24.0.2 • DISCRETE</div>
    </div>

    <div class="main-ui">
        <h1>🌸 SOHP GUIDES</h1>
        <div class="grid">
            <div class="left-col">
                <div class="card" style="border-top: 5px solid var(--peach);">
                    <h2 style="margin-top:0; color:var(--peach);">Submit Guide</h2>
                    <input id="gTitle" placeholder="Guide Title">
                    <select id="gCat"></select>
                    <textarea id="gContent" placeholder="Write your full guide here..." rows="4"></textarea>
                    <input type="file" id="gFile">
                    <button onclick="submitGuide()">Submit for Approval ✨</button>
                </div>
                
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="search" placeholder="Search..." onkeyup="filter()" style="margin:0;">
                    <select id="catFilter" onchange="filter()" style="margin:0; width:140px;"></select>
                </div>
                <div id="guides"></div>
            </div>

            <div class="right-col">
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Updates</h2>
                <div id="updates"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    let admin = false;

    function openAdmin() {
        if(!admin) { if(prompt("Password?") === 'skibidi') admin = true; else return; }
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminOverlay').style.display = 'block';
        loadAdmin();
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminOverlay').style.display = 'none'; }

    async function load() {
        // Load Wallpaper
        const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
        if (bg) document.getElementById('bg').style.backgroundImage = `url('${bg.value}')`;

        // Load Tags
        const { data: tags } = await client.from("guide_categories").select("*");
        const f = document.getElementById('catFilter');
        const s = document.getElementById('gCat');
        f.innerHTML = '<option value="All">All Tags</option>'; s.innerHTML = '';
        tags?.forEach(t => { 
            f.innerHTML += `<option value="${t.name}">${t.name}</option>`; 
            s.innerHTML += `<option value="${t.name}">${t.name}</option>`; 
        });

        // Load Guides
        const { data: gs } = await client.from("Euides").select("*").eq("approved", true).order("created_at", {ascending: false});
        const gDiv = document.getElementById("guides");
        gDiv.innerHTML = "";
        gs?.forEach(g => {
            let img = g.image_url ? `<img src="${g.image_url}" style="width:100%; border-radius:12px; margin-top:15px;">` : "";
            gDiv.innerHTML += `<div class="card" data-cat="${g.category}">
                <span style="font-size:10px; font-weight:800; color:var(--peach); text-transform:uppercase;">${g.category}</span>
                <h3 style="margin:5px 0;">${g.title}</h3>
                <p style="white-space:pre-wrap; font-size:14px; color:#444; line-height:1.5;">${g.content}</p>
                ${img}
            </div>`;
        });

        // Load Updates
        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const uDiv = document.getElementById("updates");
        uDiv.innerHTML = "";
        us?.forEach(u => {
            let d = new Date(u.created_at).toLocaleDateString();
            uDiv.innerHTML += `<div class="card" style="padding:15px; border-left:5px solid var(--peach);">
                <div style="font-size:10px; color:#999; margin-bottom:5px;">📅 ${d}</div>
                <p style="margin:0; font-size:14px;">${u.content}</p>
                ${admin ? `<div style="color:red; font-size:10px; margin-top:10px; cursor:pointer;" onclick="del('community_updates', ${u.id})">Delete</div>` : ''}
            </div>`;
        });
    }

    async function loadAdmin() {
        // Load Pending
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const pDiv = document.getElementById("pendingQueue");
        pDiv.innerHTML = p?.length ? "" : "No pending guides.";
        p?.forEach(i => {
            pDiv.innerHTML += `<div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #eee;">
                <h4 style="margin:0;">${i.title}</h4>
                <p style="font-size:12px; white-space:pre-wrap; background:white; padding:10px; border-radius:10px; margin:10px 0;">${i.content}</p>
                <div style="display:flex; gap:5px;">
                    <button onclick="approve(${i.id})" style="background:#2ecc71; padding:8px;">Approve</button>
                    <button onclick="del('Euides', ${i.id})" style="background:#ff4d4d; padding:8px;">Reject</button>
                </div>
            </div>`;
        });

        // Load Tags for Manager
        const { data: tags } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagList");
        tDiv.innerHTML = "";
        tags?.forEach(t => {
            tDiv.innerHTML += `<div class="tag-row"><span>${t.name}</span><span class="del-tag" onclick="del('guide_categories', ${t.id})">×</span></div>`;
        });
    }

    async function addTag() {
        const n = document.getElementById('newTagName').value;
        if(n) { await client.from("guide_categories").insert([{name: n}]); load(); loadAdmin(); }
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        if(!t || !c) return alert("Fill fields!");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false}]);
        alert("Submitted!"); location.reload();
    }

    async function approve(id) { await client.from("Euides").update({approved:true}).eq("id", id); load(); loadAdmin(); }
    async function postBroadcast() { await client.from("community_updates").insert([{content: document.getElementById("announcementText").value}]); location.reload(); }
    window.del = async (t, id) => { if(confirm("Confirm?")) { await client.from(t).delete().eq("id", id); location.reload(); } };

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('catFilter').value;
        document.querySelectorAll('#guides .card').forEach(c => {
            const match = c.innerText.toLowerCase().includes(q) && (cat === "All" || c.dataset.cat === cat);
            c.style.display = match ? 'block' : 'none';
        });
    }

    window.onload = load;
</script>
</body>
</html>
