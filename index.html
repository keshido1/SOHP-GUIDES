<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V29</title>
    <link rel="icon" type="image/png" href="https://example.com/your-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.92); --outline: #cbd5e1; }

        /* The Background Fix */
        #site-bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -9999; /* Furthest back possible */
            background-color: #222; /* If all else fails, dark gray */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #bg-blur-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            backdrop-filter: blur(25px) brightness(0.7); /* The Blur */
            background: rgba(0,0,0,0.2); /* Slight tint for readability */
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: transparent !important; /* MUST be transparent for BG to show */
        }

        .main-ui { padding: 40px 20px; position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; }

        /* Outlined Cards & Textboxes */
        .card { 
            background: var(--glass); border-radius: 28px; padding: 25px; 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.5);
            position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: 2px solid var(--outline); border-radius: 16px; 
            box-sizing: border-box; font-family: inherit; background: #ffffff;
            font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--peach); outline: none; }

        .delete-x {
            position: absolute; top: 15px; right: 15px; background: #ef4444; color: white;
            width: 26px; height: 26px; border-radius: 8px; display: flex; 
            align-items: center; justify-content: center; font-weight: 800; 
            cursor: pointer; z-index: 50; border: none; font-size: 14px;
        }

        .time-tag { font-size: 11px; color: #64748b; font-weight: 700; display: block; margin-bottom: 8px; }

        /* Media Container */
        .media-box { margin-top: 15px; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #e2e8f0; }
        .media-box img, .media-box video { width: 100%; display: block; max-height: 450px; object-fit: contain; }
        
        button { background: var(--peach); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,142,110,0.4); }

        #adminPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 750px; max-height: 85vh; overflow-y: auto; background: white; z-index: 9999; border-radius: 35px; padding: 35px; display: none; border: 4px solid var(--peach); }
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="site-bg-layer">
        <div id="bg-blur-overlay"></div>
    </div>
    
    <div style="position:fixed; bottom:85px; right:25px; background:#1e293b; color:white; width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; border:2px solid #fff;" onclick="openAdmin()">⚙️</div>
    <div style="position:fixed; bottom:25px; right:25px; background:white; color:var(--peach); width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100; border:2px solid var(--peach); font-size:22px;" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</div>

    <div id="adminOverlay" onclick="closeAdmin()"></div>
    <div id="adminPanel">
        <h2 style="color:var(--peach); margin-top:0;">Staff Dashboard</h2>
        <textarea id="bcContent" placeholder="Post a broadcast update..."></textarea>
        <button onclick="postBroadcast()" style="background:#0f172a;">Send Broadcast 📢</button>

        <hr style="border:0; border-top:1px solid #e2e8f0; margin:30px 0;">
        <h3>Submissions Queue</h3>
        <div id="pendingList">Searching for new guides...</div>

        <hr style="border:0; border-top:1px solid #e2e8f0; margin:30px 0;">
        <h3>Global Settings</h3>
        <div id="tagList"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input id="newTagName" placeholder="New Tag Name" style="margin:0;">
            <button onclick="addTag()" style="width:100px;">Add</button>
        </div>
        <input id="bgUrlInput" placeholder="Wallpaper URL (Direct Link)" style="margin-top:20px;">
        <button onclick="updateWallpaper()" style="background:#475569;">Update Site Background</button>
        
        <button onclick="closeAdmin()" style="background:#f1f5f9; color:#475569; margin-top:30px;">Close Dashboard</button>
    </div>

    <div class="main-ui">
        <h1 style="color:white; text-align:center; font-size:3rem; text-shadow:0 4px 20px rgba(0,0,0,0.5); margin-bottom:45px;">🌸 SOHP GUIDES</h1>
        <div class="grid">
            <div id="left-col">
                <div class="card" style="border-top: 6px solid var(--peach);">
                    <h2 style="margin-top:0; color:var(--peach);">Create a Guide</h2>
                    <input id="gTitle" placeholder="Guide Title">
                    <select id="gCat"></select>
                    <textarea id="gContent" placeholder="Write guide details..." rows="5"></textarea>
                    <input type="file" id="gFile" accept="image/*,video/*">
                    <button onclick="submitGuide()">Submit for Approval ✨</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:25px;">
                    <input type="text" id="search" placeholder="Search guides..." onkeyup="filter()" style="margin:0;">
                    <select id="fCat" onchange="filter()" style="margin:0; width:160px;"></select>
                </div>
                <div id="guides-list"></div>
            </div>
            <div id="right-col">
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Staff Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    let isStaff = false;

    // Relative Time Engine
    function timeAgo(date) {
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        if (seconds < 60) return "Just now";
        const intervals = { year: 31536000, month: 2592000, day: 86400, hour: 3600, minute: 60 };
        for (let key in intervals) {
            const val = Math.floor(seconds / intervals[key]);
            if (val >= 1) return val + " " + key + (val > 1 ? "s" : "") + " ago";
        }
    }

    // Auto-update timestamps every minute
    setInterval(() => {
        document.querySelectorAll('.time-tag').forEach(tag => {
            if(tag.dataset.ts) tag.innerText = "🕒 " + timeAgo(tag.dataset.ts);
        });
    }, 60000);

    function checkPass() { return prompt("Staff Password?") === 'skibidi'; }
    function openAdmin() { if(!isStaff) { if(checkPass()) isStaff = true; else return; } document.getElementById('adminPanel').style.display = 'block'; document.getElementById('adminOverlay').style.display = 'block'; loadAdmin(); }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminOverlay').style.display = 'none'; }
    async function safeDelete(table, id) { if(checkPass()) { await client.from(table).delete().eq("id", id); location.reload(); } }

    function getMediaHTML(url) {
        if(!url) return "";
        const isVid = url.toLowerCase().match(/\.(mp4|mov|webm)$/);
        return `<div class="media-box">${isVid ? `<video controls src="${url}"></video>` : `<img src="${url}">`}</div>
                <div style="text-align:right;"><a href="${url}" download class="card" style="display:inline-block; padding:8px 15px; margin-top:10px; text-decoration:none; font-size:11px; font-weight:800; border:2px solid var(--peach);">Download Media 📥</a></div>`;
    }

    async function load() {
        // FORCE BACKGROUND
        const { data: bgData } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
        if (bgData && bgData.value) {
            document.getElementById('site-bg-layer').style.backgroundImage = `url('${bgData.value}')`;
        }

        const { data: cats } = await client.from("guide_categories").select("*");
        const f = document.getElementById('fCat'); const p = document.getElementById('gCat');
        f.innerHTML = '<option value="All">All Tags</option>'; p.innerHTML = '';
        cats?.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; p.innerHTML += `<option value="${c.name}">${c.name}</option>`; });

        const { data: gs } = await client.from("Euides").select("*").eq("approved", true).order("created_at", {ascending: false});
        const gDiv = document.getElementById("guides-list"); gDiv.innerHTML = "";
        gs?.forEach(g => {
            gDiv.innerHTML += `<div class="card" data-cat="${g.category}">
                <div class="delete-x" onclick="safeDelete('Euides', ${g.id})">×</div>
                <span class="time-tag" data-ts="${g.created_at}">🕒 ${timeAgo(g.created_at)}</span>
                <span style="font-size:10px; font-weight:800; color:var(--peach); text-transform:uppercase;">${g.category}</span>
                <h3 style="margin:8px 0;">${g.title}</h3>
                <p style="white-space:pre-wrap; font-size:14px; color:#334155; line-height:1.7;">${g.content}</p>
                ${getMediaHTML(g.image_url)}
            </div>`;
        });

        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const uDiv = document.getElementById("updates-list"); uDiv.innerHTML = "";
        us?.forEach(u => {
            uDiv.innerHTML += `<div class="card" style="padding:15px; border-left:6px solid var(--peach);">
                <div class="delete-x" onclick="safeDelete('community_updates', ${u.id})">×</div>
                <div class="time-tag" data-ts="${u.created_at}">🕒 ${timeAgo(u.created_at)}</div>
                <p style="margin:0; font-size:14px;">${u.content}</p>
            </div>`;
        });
    }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const pDiv = document.getElementById("pendingList"); pDiv.innerHTML = p?.length ? "" : "No guides pending review.";
        p?.forEach(i => {
            pDiv.innerHTML += `<div style="background:#f8fafc; padding:20px; border-radius:24px; margin-bottom:15px; border:1px solid #e2e8f0;">
                <h4 style="margin:0; color:var(--peach);">${i.title}</h4>
                <div style="font-size:13px; white-space:pre-wrap; background:#fff; padding:15px; border-radius:15px; margin:10px 0; border:1px solid #e2e8f0;">${i.content}</div>
                ${getMediaHTML(i.image_url)}
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="approve(${i.id})" style="background:#22c55e; flex:1;">Approve</button>
                    <button onclick="safeDelete('Euides', ${i.id})" style="background:#ef4444; flex:1;">Reject</button>
                </div>
            </div>`;
        });
        const { data: cats } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagList"); tDiv.innerHTML = "";
        cats?.forEach(c => { tDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; background:#f1f5f9; padding:10px 15px; border-radius:12px;"><span>${c.name}</span><span style="color:red; cursor:pointer; font-weight:800;" onclick="safeDelete('guide_categories', ${c.id})">×</span></div>`; });
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCat").value, f = document.getElementById("gFile").files[0];
        if(!t || !c) return alert("Please enter a title and content.");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false}]);
        alert("Submitted for review!"); location.reload();
    }

    async function approve(id) { await client.from("Euides").update({approved:true}).eq("id", id); load(); loadAdmin(); }
    async function postBroadcast() { await client.from("community_updates").insert([{content: document.getElementById("bcContent").value}]); location.reload(); }
    async function addTag() { await client.from("guide_categories").insert([{name: document.getElementById('newTagName').value}]); load(); loadAdmin(); }
    async function updateWallpaper() { await client.from("site_settings").upsert({id: "wallpaper", value: document.getElementById('bgUrlInput').value}); location.reload(); }
    
    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        document.querySelectorAll('#guides-list .card').forEach(c => {
            const match = c.innerText.toLowerCase().includes(q) && (cat === "All" || c.dataset.cat === cat);
            c.style.display = match ? 'block' : 'none';
        });
    }
    window.onload = load;
</script>
</body>
</html>
