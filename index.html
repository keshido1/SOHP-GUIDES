<!DOCTYPE html>
<html>
<head>
  <title>SOHP Guides</title>
  <!-- ✅ Supabase v1 CDN for browser -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.6/dist/supabase.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    .post { border: 1px solid #ccc; padding: 15px; margin: 20px 0; }
    img, video { max-width: 100%; margin-top: 10px; display: block; }
    #preview img, #preview video { margin-bottom: 10px; }
  </style>
</head>
<body>

<h1>SOHP Guides</h1>

<h2>Create Guide</h2>
<input id="title" placeholder="Guide title"><br><br>
<textarea id="content" placeholder="Guide content"></textarea><br><br>

<label>Upload Image:</label>
<input type="file" id="image" accept="image/*"><br><br>

<label>Upload Video:</label>
<input type="file" id="video" accept="video/*"><br><br>

<div id="preview"></div>

<button id="postGuideBtn">Post Guide</button>

<h2>All Guides</h2>
<div id="guides"></div>

<script>
window.addEventListener("DOMContentLoaded", () => {
  // ✅ Correct v1 CDN initialization
  const supabaseClient = supabase.createClient(
    "https://ioruwtajlnnxxqmgxugn.supabase.co", // Replace with your Supabase URL
    "YOUR_ANON_KEY" // Replace with your anon key
  );

  const previewContainer = document.getElementById("preview");
  const imageInput = document.getElementById("image");
  const videoInput = document.getElementById("video");

  // Live preview of image/video
  imageInput.addEventListener("change", () => {
    previewContainer.innerHTML = "";
    const file = imageInput.files[0];
    if (file) {
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      previewContainer.appendChild(img);
    }
  });

  videoInput.addEventListener("change", () => {
    const file = videoInput.files[0];
    if (file) {
      const vid = document.createElement("video");
      vid.src = URL.createObjectURL(file);
      vid.controls = true;
      previewContainer.appendChild(vid);
    }
  });

  // Function to create a guide
  async function createGuide() {
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const imageFile = imageInput.files[0];
    const videoFile = videoInput.files[0];

    if (!title || !content) {
      alert("Please enter a title and content");
      return;
    }

    let imageUrl = null;
    let videoUrl = null;

    try {
      // Upload image
      if (imageFile) {
        const { data, error } = await supabaseClient
          .storage.from("guide-media").upload(`images/${Date.now()}_${imageFile.name}`, imageFile);
        if (error) throw error;
        imageUrl = supabaseClient.storage.from("guide-media").getPublicUrl(data.key).publicURL;
      }

      // Upload video
      if (videoFile) {
        const { data, error } = await supabaseClient
          .storage.from("guide-media").upload(`videos/${Date.now()}_${videoFile.name}`, videoFile);
        if (error) throw error;
        videoUrl = supabaseClient.storage.from("guide-media").getPublicUrl(data.key).publicURL;
      }

      // Insert into Euides table
      const { error } = await supabaseClient
        .from("Euides")
        .insert([{ title, content, image_url: imageUrl, video_url: videoUrl }]);
      if (error) throw error;

      // Clear inputs
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      imageInput.value = "";
      videoInput.value = "";
      previewContainer.innerHTML = "";

      loadGuides();
    } catch (err) {
      console.error("Error posting guide:", err.message);
      alert("Error posting guide: " + err.message);
    }
  }

  // Function to load all guides
  async function loadGuides() {
    try {
      const { data, error } = await supabaseClient
        .from("Euides")
        .select("*")
        .order("created_at", { ascending: false });
      if (error) throw error;

      const container = document.getElementById("guides");
      container.innerHTML = "";

      data.forEach(g => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <h3>${g.title}</h3>
          <p>${g.content}</p>
          ${g.image_url ? `<img src="${g.image_url}" />` : ""}
          ${g.video_url ? `<video src="${g.video_url}" controls></video>` : ""}
        `;
        container.appendChild(div);
      });
    } catch (err) {
      console.error("Error loading guides:", err.message);
    }
  }

  document.getElementById("postGuideBtn").addEventListener("click", createGuide);
  loadGuides();
});
</script>

</body>
</html>
