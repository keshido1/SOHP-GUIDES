<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://media.tenor.com/fMM0hMUIBvwAAAAe/columbina-genshin.png">
    <title>SOHP Guides - Columbina Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); --outline: #cbd5e1; }
        
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s;
        }
        #intro-image { max-width: 100%; max-height: 100%; object-fit: contain; }
        .intro-hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }

        /* Maintenance Overlay */
        #maintenance-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1a1a1a; z-index: 9997; display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center; padding: 20px;
        }
        #maint-timer { font-size: 2.5rem; font-weight: 800; color: var(--peach); margin-top: 20px; font-variant-numeric: tabular-nums; }

        #site-bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -9999; background: #1a1a1a no-repeat center center; background-size: cover; }
        #bg-blur-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(20px) brightness(0.6); background: rgba(0,0,0,0.3); transition: 0.6s; }
        
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; background: transparent !important; }

        body.wallpaper-mode .main-ui, body.wallpaper-mode .floating-tools button:not(.eye-toggle) { 
            opacity: 0 !important; pointer-events: none !important; transform: translateY(20px); 
        }
        body.wallpaper-mode #bg-blur-overlay { backdrop-filter: blur(0px) brightness(1); background: transparent; }

        .main-ui { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .content-layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        .guide-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

        .preview-card { background: var(--glass); border-radius: 22px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .preview-thumb { width: 100%; height: 140px; object-fit: cover; background: #000; }
        
        #modalOverlay, #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .panel-content { background: white; width: 95%; max-width: 900px; max-height: 90vh; border-radius: 30px; overflow-y: auto; padding: 40px; position: relative; }

        .full-view-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 20px; margin-bottom: 20px; background: #f8fafc; }

        .comment-item { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; position: relative; border: 1px solid #eef2f6; }
        .comment-user { font-weight: 800; color: var(--peach); font-size: 11px; margin-bottom: 4px; }
        
        #updates-list { background: var(--glass); padding: 20px; border-radius: 22px; min-height: 200px; }

        .floating-tools { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        button { background: var(--peach); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-red { background: #ef4444 !important; }
        .btn-gray { background: #475569 !important; }
        input, textarea, select { padding: 12px; border-radius: 12px; border: 2px solid var(--outline); width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .admin-box { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        @media (max-width: 900px) { .content-layout { grid-template-columns: 1fr; } }

    @keyframes blossomGlow {
        0% { filter: drop-shadow(0 0 5px rgba(255,142,110,0.4)); opacity: 0.8; }
        50% { filter: drop-shadow(0 0 20px rgba(255,142,110,0.9)); opacity: 1; }
        100% { filter: drop-shadow(0 0 5px rgba(255,142,110,0.4)); opacity: 0.8; }
    }
    .blossom-pulse {
        animation: blossomGlow 3s infinite ease-in-out;
    }
    </style>
</head>
<body>
    <div id="maintenance-overlay">
        <h1 style="font-size: 3rem; color: var(--peach);">BRB! 🛠️</h1>
        <p id="maintenance-msg" style="max-width: 600px; font-size: 1.2rem; opacity: 0.8;">The site is currently down for maintenance. Please check back later!</p>
        <div id="maint-timer"></div>
    </div>

    <div id="intro-overlay">
        <img id="intro-image" src="https://64.media.tumblr.com/c65d58db845ea9ff9cbc5962b410cde1/226f4374a9d95525-32/s540x810/87bbf8e7d11f38c6283670e0aad10dbb95cc75c2.gif" alt="Intro">
    </div>

    <div id="site-bg-layer"><div id="bg-blur-overlay"></div></div>

    <div class="floating-tools">
        <button class="circle-btn" style="background:#1e293b; color:white;" onclick="openAdmin()">⚙️</button>
        <button class="circle-btn eye-toggle" style="background:white; color:var(--peach);" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</button>
    </div>

    <div id="modalOverlay" onclick="closeModals(event)"><div class="panel-content" id="modal-body"></div></div>

    <div id="adminOverlay" onclick="closeModals(event)">
        <div class="panel-content">
            <h1 style="color:var(--peach);">Staff Dashboard</h1>
            <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:20px;">
                <div>
                    <div class="admin-box" style="border: 2px solid var(--peach);">
                        <h3>🛠️ Maintenance Mode</h3>
                        <textarea id="maintMsgInput" placeholder="Maintenance message..."></textarea>
                        <label style="font-size:11px; font-weight:800;">OPTIONAL: End Time (YYYY-MM-DDTHH:MM:SS)</label>
                        <input id="maintTimeInput" placeholder="e.g. 2026-03-20T18:00:00">
                        <div style="display:flex; gap:10px;">
                            <button onclick="toggleMaintenance(true)" style="flex:1;">Enable Maintenance</button>
                            <button onclick="toggleMaintenance(false)" class="btn-gray" style="flex:1;">Disable Maintenance</button>
                        </div>
                    </div>
                    
                    <div class="admin-box">
                        <h3>📝 Review Queue</h3>
                        <div id="pendingList">Scanning...</div>
                    </div>
                    <div class="admin-box">
                        <h3>🏷️ Tag Manager</h3>
                        <div id="tagManagerList"></div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input id="newTagName" placeholder="New Tag..." style="margin:0;">
                            <button onclick="addTag()">Add</button>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="admin-box">
                        <h3>📢 Post Update</h3>
                        <textarea id="bcContent" placeholder="Announcement..."></textarea>
                        <button onclick="postUpdate()" style="width:100%;">Post Update</button>
                    </div>
                    <div class="admin-box">
                        <h3>🖼️ Wallpaper Settings</h3>
                        <input id="bgUrlInput" placeholder="Wallpaper URL">
                        <button onclick="updateWallpaper()" style="width:100%;" class="btn-gray">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-ui">
        <div style="text-align: center; margin-bottom: 60px; position: relative; padding: 30px 0;">
            <div style="position: relative; display: inline-block;">
                <div class="blossom-pulse" style="position: absolute; left: -140px; top: -40px; width: 160px; z-index: 1; pointer-events: none; opacity: 0.9;">
                    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg"><path d="M10,100 C40,80 80,90 120,60" stroke="#4a3731" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M60,85 C70,70 90,65 100,50" stroke="#4a3731" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="120" cy="60" r="10" fill="#ff8e6e" opacity="0.6" filter="blur(4px)"/><circle cx="120" cy="60" r="6" fill="#fff" opacity="0.9"/><circle cx="95" cy="55" r="8" fill="#ffb7a1" opacity="0.8"/><circle cx="45" cy="88" r="5" fill="#ff8e6e"/><circle cx="10" cy="100" r="4" fill="#ffb7a1"/></svg>
                </div>
                <h1 style="color:white; font-size:4rem; font-weight:800; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255,142,110,0.8), 0 10px 20px rgba(0,0,0,0.6); position: relative; z-index: 2; margin: 0;">SOHP<span style="color:var(--peach); margin-left:15px; filter: drop-shadow(0 0 10px var(--peach));">GUIDES</span></h1>
                <div style="height: 3px; width: 60%; background: linear-gradient(90deg, transparent, var(--peach), transparent); margin: 10px auto; opacity: 0.6;"></div>
                <div class="blossom-pulse" style="position: absolute; right: -140px; bottom: -30px; width: 160px; z-index: 1; pointer-events: none; transform: scaleX(-1) rotate(15deg); opacity: 0.9;">
                    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg"><path d="M10,100 C40,80 80,90 120,60" stroke="#4a3731" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="120" cy="60" r="12" fill="#ff8e6e" opacity="0.5" filter="blur(6px)"/><circle cx="120" cy="60" r="7" fill="#fff" opacity="0.9"/><circle cx="80" cy="82" r="9" fill="#ffb7a1" opacity="0.8"/><circle cx="150" cy="45" r="5" fill="#ff8e6e"/></svg>
                </div>
            </div>
        </div>

        <div class="admin-box" style="background:var(--glass); display:flex; justify-content:space-between; align-items:center;">
            <div id="user-status" style="font-weight: 800;">Guest Mode</div>
            <div id="auth-ui">
                <input id="auth-email" placeholder="Email" style="width:150px; margin:0;">
                <input id="auth-pass" type="password" placeholder="Pass" style="width:100px; margin:0;">
                <button onclick="handleAuth('login')">Login</button>
                <button onclick="handleAuth('signup')" class="btn-gray">Join</button>
            </div>
            <button id="logout-btn" class="btn-red hidden" onclick="client.auth.signOut().then(()=>location.reload())">Logout</button>
        </div>

        <div class="content-layout">
            <div>
                <div class="admin-box" style="background:var(--glass);">
                    <h3>Submit New Guide</h3>
                    <input id="gTitle" placeholder="Guide Title">
                    <div style="display:flex; gap:10px;">
                        <select id="gCatSelector"></select>
                        <input type="file" id="gFile">
                    </div>
                    <textarea id="gContent" placeholder="Write guide..." rows="3"></textarea>
                    <button onclick="submitGuide()" style="width:100%;">Submit Guide ✨</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input id="search" placeholder="Search guides..." onkeyup="loadGuides()" style="margin:0;">
                    <select id="fCat" onchange="loadGuides()" style="width:150px; margin:0;"></select>
                </div>
                <div id="guide-grid" class="guide-grid"></div>
            </div>
            <div>
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">📢 Recent Updates</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    
    let isStaff = false;
    let currentUser = null;
    let maintInterval = null;
    const STAFF_PASS = '@$#@!!@#$';

    function checkStaff() {
        if (isStaff) return true;
        const p = prompt("Enter Staff Password:");
        if (p === STAFF_PASS) { isStaff = true; return true; }
        alert("Incorrect Password"); return false;
    }

    async function load() {
        const { data: maint } = await client.from("site_settings").select("*").in("id", ["maintenance_mode", "maintenance_message", "maintenance_end"]);
        const isMaint = maint?.find(s => s.id === 'maintenance_mode')?.value === 'true';
        const msg = maint?.find(s => s.id === 'maintenance_message')?.value || "Site is under maintenance.";
        const endAt = maint?.find(s => s.id === 'maintenance_end')?.value;
        
        if (isMaint && !isStaff) {
            document.getElementById('maintenance-overlay').style.display = 'flex';
            document.getElementById('maintenance-msg').innerText = msg;
            if(endAt) startCountdown(endAt);
        } else {
            document.getElementById('maintenance-overlay').style.display = 'none';
        }

        const [u, bg, cats] = await Promise.all([
            client.auth.getUser(),
            client.from("site_settings").select("value").eq("id", "wallpaper").single(),
            client.from("guide_categories").select("*")
        ]);
        if(u.data.user) {
            currentUser = u.data.user;
            document.getElementById('user-status').innerText = currentUser.email;
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
        }
        if(bg.data?.value) document.getElementById('site-bg-layer').style.backgroundImage = `url('${bg.data.value}')`;
        const f = document.getElementById('fCat'), g = document.getElementById('gCatSelector');
        f.innerHTML = '<option value="All">All Tags</option>'; g.innerHTML = '';
        cats.data?.forEach(c => { 
            const opt = `<option value="${c.name}">${c.name}</option>`;
            f.innerHTML += opt; g.innerHTML += opt; 
        });
        loadGuides();
        loadUpdates();
    }

    function startCountdown(endTime) {
        if(maintInterval) clearInterval(maintInterval);
        const timerDiv = document.getElementById('maint-timer');
        const target = new Date(endTime).getTime();
        
        maintInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) {
                timerDiv.innerText = "Reopening soon...";
                clearInterval(maintInterval);
                return;
            }
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            timerDiv.innerText = `${h}h ${m}m ${s}s`;
        }, 1000);
    }

    async function toggleMaintenance(enabled) {
        if (!checkStaff()) return;
        const msg = document.getElementById('maintMsgInput').value || "The site is currently down for maintenance. Please check back later!";
        const end = document.getElementById('maintTimeInput').value;
        await client.from("site_settings").upsert([
            {id: "maintenance_mode", value: enabled.toString()}, 
            {id: "maintenance_message", value: msg},
            {id: "maintenance_end", value: end || ""}
        ]);
        alert(enabled ? "Maintenance Mode ON" : "Maintenance Mode OFF");
        location.reload();
    }

    // Rest of your original functions (openDetails, loadComments, postComment, openAdmin, etc.)
    async function openDetails(g) {
        client.from("Euides").update({ views: (g.views || 0) + 1 }).eq("id", g.id);
        document.getElementById('modal-body').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom: 20px;">
                <h1>${g.title}</h1>
                <div style="display:flex; gap:10px;">
                    ${g.image_url ? `<a href="${g.image_url}" download target="_blank"><button style="background:#6366f1;">Download File</button></a>` : ''}
                    <button class="btn-gray" onclick="editGuide(${g.id}, \`${g.title.replace(/'/g, "\\'")}\`, \`${g.content.replace(/`/g, "\\`")}\`)">Edit</button>
                    <button class="btn-red" onclick="deleteItem('Euides', ${g.id})">Delete</button>
                </div>
            </div>
            ${g.image_url ? `<img src="${g.image_url}" class="full-view-img">` : ''}
            <p style="white-space:pre-wrap; line-height:1.6;">${g.content}</p>
            <div style="margin-top:40px; padding-top:20px; border-top:2px solid #eee;">
                <h3>💬 Comments</h3>
                <div id="comment-list">Loading...</div>
                <textarea id="newComment" placeholder="${currentUser ? 'Add a comment...' : 'Log in to comment'}" ${!currentUser ? 'disabled' : ''} style="margin-top:15px;"></textarea>
                <button onclick="postComment(${g.id})" style="width:100%;" ${!currentUser ? 'disabled' : ''}>Post</button>
            </div>`;
        document.getElementById('modalOverlay').style.display = 'flex';
        loadComments(g.id);
    }

    async function loadComments(guideId) {
        const { data: coms } = await client.from("guide_comments").select("*").eq("guide_id", guideId).order("created_at", {ascending: true});
        const div = document.getElementById('comment-list');
        div.innerHTML = coms?.length ? "" : "No comments yet.";
        coms?.forEach(c => {
            div.innerHTML += `<div class="comment-item">
                <div class="comment-user">${c.user_email || 'Member'}</div>
                <div>${c.content}</div>
                ${(isStaff || (currentUser && currentUser.id === c.user_id)) ? `<button onclick="deleteComment('${c.id}', ${guideId})" style="position:absolute; right:10px; top:10px; background:none; color:red; font-size:10px; padding:0;">Delete</button>` : ''}
            </div>`;
        });
    }

    async function postComment(guideId) {
        const text = document.getElementById('newComment').value;
        if(!text || !currentUser) return;
        await client.from("guide_comments").insert([{ guide_id: guideId, user_id: currentUser.id, user_email: currentUser.email, content: text }]);
        loadComments(guideId);
        document.getElementById('newComment').value = "";
    }

    function openAdmin() { if (checkStaff()) { document.getElementById('adminOverlay').style.display = 'flex'; loadAdmin(); } }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const div = document.getElementById('pendingList'); div.innerHTML = p?.length ? "" : "Queue empty.";
        p?.forEach(i => {
            const iStr = JSON.stringify(i).replace(/'/g, "&apos;");
            div.innerHTML += `<div class="admin-box" style="background:white;">
                <h4>${i.title}</h4>
                <div style="display:flex; gap:5px;">
                    <button onclick="approve(${i.id})" style="background:#22c55e; flex:1;">Approve</button>
                    <button onclick='openDetails(${iStr})' class="btn-gray" style="flex:1;">View</button>
                    <button onclick="deleteItem('Euides', ${i.id})" class="btn-red" style="flex:1;">Reject</button>
                </div>
            </div>`;
        });
        const { data: cats } = await client.from("guide_categories").select("*");
        const tDiv = document.getElementById("tagManagerList"); tDiv.innerHTML = "";
        cats?.forEach(c => { 
            tDiv.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>${c.name}</span><button onclick="deleteItem('guide_categories', ${c.id})" style="background:none; color:red; padding:0;">🗑️</button></div>`; 
        });
    }

    async function loadGuides() {
        const q = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('fCat').value;
        let query = client.from("Euides").select("*").eq("approved", true).order("pinned", {ascending: false});
        if(cat !== "All") query = query.eq("category", cat);
        const { data: gs } = await query;
        const grid = document.getElementById('guide-grid'); grid.innerHTML = "";
        gs?.filter(g => g.title.toLowerCase().includes(q)).forEach(g => {
            const gStr = JSON.stringify(g).replace(/'/g, "&apos;");
            grid.innerHTML += `<div class="preview-card" onclick='openDetails(${gStr})'>
                <img class="preview-thumb" src="${g.image_url || 'https://via.placeholder.com/300x140'}">
                <div style="padding:15px;"><h4>${g.title}</h4><span style="font-size:10px; opacity:0.6;">${g.category || 'General'}</span></div>
            </div>`;
        });
    }

    async function loadUpdates() {
        const { data: us } = await client.from("community_updates").select("*").order("created_at", {ascending: false});
        const div = document.getElementById("updates-list"); div.innerHTML = "";
        us?.forEach(u => { 
            div.innerHTML += `<div class="comment-item">${isStaff ? `<button class="btn-red" style="float:right; padding:2px 5px; font-size:10px;" onclick="deleteItem('community_updates', ${u.id})">X</button>` : ''}${u.content}</div>`; 
        });
    }

    function closeModals(e) { if(e.target.id.includes('Overlay')) e.target.style.display = 'none'; }

    async function approve(id) { if (!checkStaff()) return; await client.from("Euides").update({approved:true}).eq("id", id); loadAdmin(); loadGuides(); }
    
    async function addTag() { 
        if (!checkStaff()) return; 
        const tagName = document.getElementById('newTagName').value;
        if(!tagName) return;
        await client.from("guide_categories").insert([{name: tagName}]); 
        document.getElementById('newTagName').value = "";
        load(); loadAdmin();
    }

    async function updateWallpaper() { if (!checkStaff()) return; const url = document.getElementById('bgUrlInput').value; await client.from("site_settings").upsert({id: "wallpaper", value: url}); document.getElementById('site-bg-layer').style.backgroundImage = `url('${url}')`; }

    async function postUpdate() { if (!checkStaff()) return; await client.from("community_updates").insert([{content: document.getElementById('bcContent').value}]); loadUpdates(); }
    
    async function editGuide(id, oldT, oldC) {
        if (!checkStaff()) return;
        const nt = prompt("New Title:", oldT), nc = prompt("New Content:", oldC);
        if(nt && nc) { await client.from("Euides").update({title:nt, content:nc}).eq("id", id); loadGuides(); document.getElementById('modalOverlay').style.display = 'none'; }
    }

    async function deleteItem(table, id) { 
        if (!checkStaff()) return;
        if(confirm("Delete this permanently?")) { 
            await client.from(table).delete().eq("id", id); 
            if(table === 'Euides') { loadGuides(); loadAdmin(); document.getElementById('modalOverlay').style.display = 'none'; }
            else if(table === 'guide_categories') { load(); loadAdmin(); }
            else loadUpdates();
        } 
    }

    async function submitGuide() {
        const t = document.getElementById("gTitle").value, c = document.getElementById("gContent").value, cat = document.getElementById("gCatSelector").value, f = document.getElementById("gFile").files[0];
        if(!t || !c) return alert("Missing Info");
        let url = null;
        if(f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{title:t, content:c, category:cat, image_url:url, approved:false, views:0}]);
        alert("Sent for review!");
        location.reload();
    }

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value, password = document.getElementById('auth-pass').value;
        const { error } = type === 'login' ? await client.auth.signInWithPassword({email, password}) : await client.auth.signUp({email, password});
        if(error) alert(error.message); else load();
    }

    window.addEventListener('load', () => {
        load();
        setTimeout(() => {
            document.getElementById('intro-overlay').classList.add('intro-hidden');
            setTimeout(() => document.getElementById('intro-overlay').remove(), 1000);
        }, 1500); 
    });
</script>
</body>
</html>
