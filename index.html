<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides - V23 Perfect Blur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --peach: #ff8e6e; --glass: rgba(255, 255, 255, 0.98); }

        /* Remove Black Background entirely */
        html, body { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: transparent !important;
            overflow-x: hidden;
        }

        /* Fixed Background System */
        .bg-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: #222; /* Fallback only if no image loads */
        }

        .bg-layer { 
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; 
            background-size: cover; background-position: center;
            filter: blur(30px) brightness(0.7); /* Deep blur effect */
            transition: filter 0.5s ease;
        }

        /* White Edge Glow Layer */
        .edge-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            box-shadow: inset 0 0 120px 30px rgba(255, 255, 255, 0.25);
        }

        body.wallpaper-mode .bg-layer { filter: blur(0px) brightness(1); }
        body.wallpaper-mode .main-ui, body.wallpaper-mode .edge-glow { opacity: 0; pointer-events: none; }

        .main-ui { padding: 40px 20px; position: relative; z-index: 1; transition: opacity 0.3s; }
        .container { display: flex; max-width: 1200px; margin: 0 auto; gap: 30px; flex-wrap: wrap; }
        h1 { font-size: 3.2rem; color: white; text-align: center; text-shadow: 0 4px 25px rgba(0,0,0,0.4); margin-bottom: 40px; font-weight: 800; }

        .card { 
            background: var(--glass); border-radius: 28px; padding: 25px; 
            margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); 
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Inputs & Buttons */
        input, textarea, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; border-radius: 16px; font-family: inherit; }
        button { background: var(--peach); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,142,110,0.3); }

        /* Admin UI Refined */
        #adminPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 700px; max-height: 85vh; overflow-y: auto; background: white; z-index: 1001; border-radius: 35px; padding: 35px; display: none; border: 2px solid var(--peach); }
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; }
        .full-text-preview { background: #f9f9f9; padding: 15px; border-radius: 16px; margin: 15px 0; font-size: 14px; line-height: 1.6; white-space: pre-wrap; max-height: 350px; overflow-y: auto; border: 1px solid #eee; }
        .version-tag { position: absolute; bottom: 15px; right: 25px; font-size: 10px; color: #bbb; letter-spacing: 1px; }

        /* Floating Controls */
        .admin-trigger { position: fixed; bottom: 90px; right: 25px; background: #111; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .toggle-ui { position: fixed; bottom: 25px; right: 25px; background: white; color: var(--peach); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 2px solid var(--peach); font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 800px) { .container { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="bg-viewport">
        <div class="bg-layer" id="bg"></div>
    </div>
    <div class="edge-glow"></div>
    
    <div class="admin-trigger" onclick="openAdmin()">⚙️</div>
    <div class="toggle-ui" onclick="document.body.classList.toggle('wallpaper-mode')">👁️</div>

    <div id="adminOverlay" onclick="closeAdmin()"></div>
    <div id="adminPanel">
        <h2 style="color:var(--peach); margin:0 0 20px 0;">Staff Dashboard</h2>
        
        <h3 style="font-size:11px; text-transform:uppercase; color:#aaa; letter-spacing:1px;">Submission Review</h3>
        <div id="pendingList">Loading...</div>

        <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
        
        <h3 style="font-size:11px; text-transform:uppercase; color:#aaa; letter-spacing:1px;">Site Controls</h3>
        <input id="bgUrl" placeholder="Direct Wallpaper URL (i.e. imgur.com/xyz.png)">
        <button onclick="changeBackground()" style="background:#444;">Apply Wallpaper</button>
        <textarea id="upContent" placeholder="New Broadcast Message..." style="margin-top:10px;"></textarea>
        <button onclick="postUpdate()" style="background:#111;">Post Update</button>

        <button onclick="closeAdmin()" style="background:#eee; color:#333; margin-top:20px; width:100%; border-radius:12px;">Close Dashboard</button>
        <div class="version-tag">SOHP-SYS V.23.0.4</div>
    </div>

    <div class="main-ui">
        <h1>🌸 SOHP GUIDES</h1>
        <div class="container">
            <div style="flex:2; min-width:320px;">
                <div class="card" style="border: 2px solid var(--peach);">
                    <h2 style="margin:0 0 15px 0; color:var(--peach);">Create a Guide</h2>
                    <input id="guideTitle" placeholder="Guide Title">
                    <select id="postCategory"></select>
                    <textarea id="guideContent" placeholder="Write your full guide here..." rows="5"></textarea>
                    <input type="file" id="guideFile">
                    <button onclick="submitGuide()">Submit for Approval ✨</button>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:25px;">
                    <input type="text" id="searchBar" placeholder="Search guides..." onkeyup="runFilters()" style="margin:0;">
                    <select id="filterCategory" onchange="runFilters()" style="margin:0; width:160px;"></select>
                </div>
                <div id="guides-list"></div>
            </div>
            
            <div style="flex:1; min-width:300px;">
                <h2 style="color:white; text-shadow:0 2px 10px rgba(0,0,0,0.5);">✨ Broadcasts</h2>
                <div id="updates-list"></div>
            </div>
        </div>
    </div>

<script>
    const client = supabase.createClient("https://ioruwtajlnnxxqmgxugn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto");
    let adminUnlocked = false;

    function openAdmin() {
        if(!adminUnlocked) {
            if(prompt("Staff Password?") === 'skibidi') adminUnlocked = true;
            else return;
        }
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminOverlay').style.display = 'block';
        loadAdmin();
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; document.getElementById('adminOverlay').style.display = 'none'; }

    async function load() {
        try {
            const { data: bg } = await client.from("site_settings").select("value").eq("id", "wallpaper").single();
            if (bg) document.getElementById('bg').style.backgroundImage = `url('${bg.value}')`;

            const { data: cats } = await client.from("guide_categories").select("*");
            const f = document.getElementById('filterCategory');
            const p = document.getElementById('postCategory');
            f.innerHTML = '<option value="All">All Tags</option>'; p.innerHTML = '';
            if(cats) cats.forEach(c => { f.innerHTML += `<option value="${c.name}">${c.name}</option>`; p.innerHTML += `<option value="${c.name}">${c.name}</option>`; });

            const { data: gs } = await client.from("Euides").select("*").eq("approved", true).order("created_at", { ascending: false });
            const gDiv = document.getElementById("guides-list");
            gDiv.innerHTML = (gs && gs.length) ? "" : "<div class='card'>No approved guides.</div>";
            if(gs) gs.forEach(g => {
                let img = g.image_url ? `<img src="${g.image_url}" style="width:100%; border-radius:18px; margin-top:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">` : "";
                gDiv.innerHTML += `<div class="card" data-category="${g.category}"><span class="tag-badge" style="background:${g.category==='Important'?'#ff4d4d':'var(--peach)'}">${g.category || 'General'}</span><h3 style="margin-top:0;">${g.title}</h3><p style="white-space:pre-wrap; color:#444;">${g.content}</p>${img}</div>`;
            });

            const { data: us } = await client.from("community_updates").select("*").order("created_at", { ascending: false });
            const uDiv = document.getElementById("updates-list");
            uDiv.innerHTML = "";
            if(us) us.forEach(u => {
                let d = u.created_at ? new Date(u.created_at).toLocaleDateString() : "Today";
                uDiv.innerHTML += `<div class="card" style="padding:20px; border-left:6px solid var(--peach);">
                    <span style="font-size:10px; color:#999; font-weight:800;">📅 ${d}</span>
                    <p style="margin:5px 0 0 0;">${u.content}</p>
                    ${adminUnlocked ? `<span style="color:#ff4d4d; cursor:pointer; font-size:10px; margin-top:10px; display:block;" onclick="del('community_updates', ${u.id})">Remove Broadcast 🗑️</span>` : ''}
                </div>`;
            });
        } catch(e) { console.error(e); }
    }

    async function loadAdmin() {
        const { data: p } = await client.from("Euides").select("*").eq("approved", false);
        const pDiv = document.getElementById("pendingList");
        pDiv.innerHTML = (p && p.length) ? "" : "Queue empty.";
        if(p) p.forEach(i => {
            pDiv.innerHTML += `
                <div style="background:#fff; border:1px solid #eee; padding:20px; border-radius:24px; margin-bottom:15px;">
                    <h4 style="margin:0; color:var(--peach);">${i.title}</h4>
                    <div class="full-text-preview">${i.content}</div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="approve(${i.id})" style="flex:1; background:#2ecc71;">Approve</button>
                        <button onclick="del('Euides', ${i.id})" style="flex:1; background:#ff4d4d;">Delete</button>
                    </div>
                </div>`;
        });
    }

    async function submitGuide() {
        const t = document.getElementById("guideTitle").value;
        const c = document.getElementById("guideContent").value;
        const cat = document.getElementById("postCategory").value;
        const f = document.getElementById("guideFile").files[0];
        if(!t || !c) return alert("Fill all fields.");
        let url = null;
        if (f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{ title: t, content: c, image_url: url, category: cat, approved: false }]);
        alert("Sent for approval!"); location.reload();
    }

    async function approve(id) { await client.from("Euides").update({ approved: true }).eq("id", id); load(); loadAdmin(); }
    async function postUpdate() { await client.from("community_updates").insert([{ content: document.getElementById("upContent").value }]); location.reload(); }
    async function changeBackground() { await client.from("site_settings").upsert({ id: "wallpaper", value: document.getElementById('bgUrl').value }); location.reload(); }
    window.del = async (t, id) => { if(confirm("Confirm delete?")) { await client.from(t).delete().eq("id", id); location.reload(); } };

    function runFilters() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const cat = document.getElementById('filterCategory').value;
        document.querySelectorAll('#guides-list .card').forEach(g => {
            const match = (g.innerText.toLowerCase().includes(q)) && (cat === "All" || g.dataset.category === cat);
            g.style.display = match ? 'block' : 'none';
        });
    }

    window.onload = load;
</script>
</body>
</html>
</html>
