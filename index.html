<input type="file" id="image"> <script>
    window.onload = function() {
        const supabaseClient = supabase.createClient(
            "https://ioruwtajlnnxxqmgxugn.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
        );

        async function loadGuides() {
            const { data, error } = await supabaseClient.from("Euides").select("*").order("created_at", { ascending: false });
            const container = document.getElementById("guides");
            if (error) { container.innerHTML = "Error: " + error.message; return; }
            container.innerHTML = data.length ? "" : "No guides found.";
            
            data.forEach(g => {
                let mediaHTML = "";
                if (g.image_url) {
                    // Check if it's an image to show a preview, otherwise just a download link
                    const isImage = /\.(jpg|jpeg|png|webp|gif|svg)$/i.test(g.image_url);
                    if (isImage) {
                        mediaHTML = `<img src="${g.image_url}" style="display:block; margin-bottom:10px;">`;
                    }
                    mediaHTML += `<a href="${g.image_url}" download target="_blank" 
                                    style="display:inline-block; padding:8px 12px; background:#28a745; color:white; text-decoration:none; border-radius:4px; font-size:14px;">
                                    Download File
                                  </a>`;
                }

                container.innerHTML += `
                    <div class="post">
                        <h3>${g.title}</h3>
                        <p>${g.content}</p>
                        ${mediaHTML}
                    </div>`;
            });
        }

        document.getElementById("postBtn").onclick = async () => {
            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;
            const file = document.getElementById("image").files[0];
            let imageUrl = null;

            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                // This uploads any file type
                const { data: uploadData, error: uploadErr } = await supabaseClient.storage
                    .from("guide-media")
                    .upload(fileName, file);
                
                if (uploadErr) {
                    alert("Upload failed: " + uploadErr.message);
                    return;
                }
                const { data: urlData } = supabaseClient.storage.from("guide-media").getPublicUrl(fileName);
                imageUrl = urlData.publicUrl;
            }

            const { error } = await supabaseClient.from("Euides").insert([{ title, content, image_url: imageUrl }]);
            if (error) alert(error.message);
            else location.reload();
        };

        loadGuides();
    };
</script>
