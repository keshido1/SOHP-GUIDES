<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOHP Guides & Updates</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-img: url('https://images.alphacoders.com/110/thumb-1920-1103783.png');
            --peach-accent: #ff8e6e;
            --peach-border: #ffdbc5;
            --text-main: #5d4a44;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Quicksand', sans-serif; 
            min-height: 100vh;
        }

        /* Background Layer */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: filter 0.5s ease;
            filter: blur(8px) brightness(0.9); /* Default Blur */
        }

        /* When UI is hidden, remove blur */
        body.hide-ui .background-overlay {
            filter: blur(0px) brightness(1);
        }

        .container { 
            display: flex; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 30px; 
            gap: 25px; 
            flex-wrap: wrap;
            transition: opacity 0.4s ease;
        }

        body.hide-ui .container {
            opacity: 0;
            pointer-events: none;
        }

        /* Layout Columns */
        .main-content { flex: 2; min-width: 350px; }
        .sidebar { flex: 1; min-width: 300px; }

        /* Peach Glass Cards */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border: 2px solid var(--peach-border); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
            color: var(--text-main);
        }

        h1, h2 { color: var(--peach-accent); margin-top: 0; text-shadow: 1px 1px 0px white; }

        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 2px solid var(--peach-border); border-radius: 12px; 
            box-sizing: border-box; background: rgba(255, 252, 251, 0.9);
            font-family: inherit; outline: none;
        }

        button { 
            background: var(--peach-accent); color: white; border: none; 
            padding: 12px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Fixed Trash Icon */
        .trash-btn {
            position: absolute; top: 15px; right: 15px;
            background: white; border: 1px solid var(--peach-border);
            border-radius: 50%; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--peach-accent); font-size: 14px;
            transition: 0.2s; z-index: 5;
        }
        .trash-btn:hover { background: #ff8e6e; color: white; }

        /* UI Toggle Button */
        .ui-toggle {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--peach-accent); color: white;
            padding: 10px 20px; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100; border: 2px solid white;
        }

        .download-link {
            display: inline-block; margin-top: 15px; padding: 10px 18px;
            background: var(--peach-border); color: var(--text-main);
            text-decoration: none; border-radius: 12px; font-weight: bold;
        }

        img { max-width: 100%; border-radius: 15px; margin-top: 15px; border: 3px solid white; }
        
        .update-item {
            background: rgba(255, 250, 250, 0.7); border-left: 5px solid var(--peach-accent);
            padding: 15px; margin-bottom: 12px; border-radius: 0 12px 12px 0; position: relative;
        }
    </style>
</head>
<body>

<div class="background-overlay"></div>

<button class="ui-toggle" onclick="toggleUI()">🖼️ Toggle View</button>

<div class="container" id="appUI">
    <div class="main-content">
        <h1>🌸 SOHP Guides</h1>
        <div class="card">
            <h2>New Guide</h2>
            <input id="title" placeholder="Guide title">
            <textarea id="content" placeholder="Instructions..." rows="3"></textarea>
            <input type="file" id="fileInput">
            <button id="postBtn">Post Guide ✨</button>
        </div>
        <div id="guides-list">Loading...</div>
    </div>

    <div class="sidebar">
        <h2>✨ Updates</h2>
        <div class="card">
            <textarea id="upContent" placeholder="Announcement..." rows="2"></textarea>
            <button id="upBtn" style="background: #5d4a44;">Post Update</button>
        </div>
        <div id="updates-list">Loading...</div>
    </div>
</div>

<script>
    const client = supabase.createClient(
        "https://ioruwtajlnnxxqmgxugn.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvcnV3dGFqbG5ueHhxbWd4dWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTI5NjUsImV4cCI6MjA4NzkyODk2NX0.A7ycF68mc6liv-5gR-niFOLE-yPvfqPgFqPHeV1yUto"
    );

    // Function to hide/show UI
    function toggleUI() {
        document.body.classList.toggle('hide-ui');
        const btn = document.querySelector('.ui-toggle');
        btn.innerText = document.body.classList.contains('hide-ui') ? "✨ Show UI" : "🖼️ View Wallpaper";

    async function loadData() {
        try {
            const { data: guides } = await client.from("Euides").select("*").order("created_at", { ascending: false });
            const gList = document.getElementById("guides-list");
            gList.innerHTML = "";
            guides.forEach(g => {
                let media = g.image_url ? (/\.(jpg|jpeg|png|gif|webp)$/i.test(g.image_url) ? `<img src="${g.image_url}">` : "") + `<br><a href="${g.image_url}" target="_blank" download class="download-link">💾 Download</a>` : "";

                    <div class="card">
                        <div class="trash-btn" onclick="deleteItem('Euides', ${g.id})">🗑️</div>
                        <h3 style="margin-right:35px">${g.title}</h3>
                        <p style="white-space: pre-wrap;">${g.content}</p>
                        ${media}
                    </div>`;
            });

            const { data: updates } = await client.from("community_updates").select("*").order("created_at", { ascending: false });
            const uList = document.getElementById("updates-list");
            uList.innerHTML = "";
            updates.forEach(u => {
                uList.innerHTML += `
                    <div class="update-item">
                        <div class="trash-btn" onclick="deleteItem('community_updates', ${u.id})" style="width:24px;height:24px;font-size:10px;">🗑️</div>
                        <p style="margin-right:25px">${u.content}</p>
                        <small>📅 ${new Date(u.created_at).toLocaleDateString()}</small>
                    </div>`;
            });
        } catch (e) { console.error(e); }
    }

    document.getElementById("postBtn").onclick = async () => {
        const t = document.getElementById("title").value;
        const c = document.getElementById("content").value;
        const f = document.getElementById("fileInput").files[0];
        if(!t || !c) return alert("Fill out the guide! 🌸");
        
        document.getElementById("postBtn").innerText = "Uploading... ✨";
        let url = null;
        if (f) {
            const name = Date.now() + "_" + f.name;
            await client.storage.from("guide-media").upload(name, f);
            url = client.storage.from("guide-media").getPublicUrl(name).data.publicUrl;
        }
        await client.from("Euides").insert([{ title: t, content: c, image_url: url }]);
        location.reload();
    };

    document.getElementById("upBtn").onclick = async () => {
        const c = document.getElementById("upContent").value;
        if(!c) return;
        if(prompt("Admin Password?") === 'skibidi') {
            await client.from("community_updates").insert([{ content: c }]);
            location.reload();
        } else { alert("Wrong! ❌"); }
    };

    window.deleteItem = async (table, id) => {
        if(prompt("Password to delete?") === 'skibidi') {
            await client.from(table).delete().eq("id", id);

    };

    window.onload = loadData;
</script>
</body>
</html>
